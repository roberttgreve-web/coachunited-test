<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta property="og:image" content="https://test.coachunited.de/og-image.png">
  <title>Wissen – COACH UNITED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: 'Inter Tight', system-ui, sans-serif; background: #f0eee9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }

    .container { width: 375px; min-height: 100vh; background: #fff; border-radius: 28px; overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,0.14); display: flex; flex-direction: column; }

    .header {
      background: #fff;
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #E6E8EF;
      position: sticky; top: 0; z-index: 20;
    }
    .logo-link { display: flex; align-items: center; text-decoration: none; }
    .logo-link img { width: 56px; height: 56px; object-fit: contain; }
    .burger-btn { background: none; border: none; cursor: pointer; padding: 6px; display: flex; flex-direction: column; gap: 5px; }
    .burger-btn span { display: block; width: 22px; height: 2px; background: #0E1430; border-radius: 2px; }

    .page-hero { background: #0E1430; padding: 22px 22px 26px; }
    .page-hero h1 {
      font-size: 24px; font-weight: 800; color: #fff;
      letter-spacing: -0.02em; line-height: 1.2; margin: 0;
    }

    .content { flex: 1; overflow-y: auto; padding: 20px 20px 100px; }

    .section-title {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px; font-weight: 600; color: #9aa3b0;
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 16px;
    }

    .article-card {
      display: flex; flex-direction: row; text-decoration: none; color: inherit;
      background: #fff; border-radius: 14px;
      border: 1px solid #edf0f5;
      margin-bottom: 10px; overflow: hidden; transition: background 0.15s;
    }
    .article-card:hover { background: #f5f7fb; }

    .card-thumb { width: 80px; height: 80px; flex-shrink: 0; object-fit: cover; background: #f0f2f5; }
    .card-thumb-placeholder {
      width: 80px; height: 80px; flex-shrink: 0;
      background: #f0f2f5;
      display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    .card-body { flex: 1; padding: 16px; min-width: 0; }
    .card-title { font-size: 14px; font-weight: 600; color: #0E1430; line-height: 1.4; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 375px; background: #fff; border-top: 1px solid #E6E8EF;
      display: flex; padding: 10px 0 24px; z-index: 20;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.05);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      border: none; background: none; cursor: pointer; padding: 4px; text-decoration: none;
      color: #6B7390; font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.01em; transition: color 0.15s;
    }
    .nav-item.active { color: #1E6BFF; }
    .nav-icon { width: 22px; height: 22px; }

    /* Drawer */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 40; }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: -280px; width: 260px; height: 100vh;
      background: #fff; z-index: 50; padding: 32px 24px;
      transition: right 0.25s ease; box-shadow: -8px 0 32px rgba(0,0,0,0.12);
    }
    .drawer.open { right: 0; }
    .drawer-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: #555; padding: 4px; }
    .drawer-logo { width: 36px; margin-bottom: 28px; }
    .drawer-link { display: block; padding: 12px 0; font-family: 'Inter Tight', system-ui, sans-serif; font-size: 15px; font-weight: 600; color: #1a1a2e; text-decoration: none; border-bottom: 1px solid #f0f2f5; }
    .drawer-link:last-child { border-bottom: none; }
    .drawer-link:hover { color: #1E6BFF; }
  </style>
  <link rel="stylesheet" href="/desktop.css">
  <script src="/desktop-nav.js" defer></script>
  <script src="/feedback-widget.js" defer></script>
</head>
<body>
  <div class="container">

    <header class="header">
      <a href="/home" class="logo-link">
        <img src="/logo.png" alt="Coach United">
      </a>
      <button class="burger-btn" onclick="openDrawer()">
        <span></span><span></span><span></span>
      </button>
    </header>

    <div class="page-hero">
      <h1>Wissen</h1>
    </div>

    <div class="content">
      <p class="section-title">Artikel &amp; Tipps</p>
      <div id="articles-list">
        <div style="padding:40px 0; text-align:center; color:#9aa3b0; font-size:14px;">Artikel werden geladen…</div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="/uebungen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4 L6 17 L16 17 Z"/><line x1="7.5" y1="11" x2="14.5" y2="11"/><line x1="4.5" y1="17" x2="17.5" y2="17"/>
        </svg>
        <span>Alle Übungen</span>
      </a>
      <a href="/einheiten" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="3" width="14" height="16" rx="2"/><line x1="7" y1="8" x2="15" y2="8"/><line x1="7" y1="12" x2="15" y2="12"/><line x1="7" y1="16" x2="12" y2="16"/>
        </svg>
        <span>Einheit erhalten</span>
      </a>
      <a href="/whatsapp-info" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6a2 2 0 012-2h10a2 2 0 012 2v7a2 2 0 01-2 2H9l-4 3v-3H6a2 2 0 01-2-2z"/>
        </svg>
        <span>WhatsApp-Kanal</span>
      </a>
      <a href="/uebung-einreichen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15.5 2.5a2.121 2.121 0 013 3L7 17l-4 1 1-4 10.5-10.5z"/>
        </svg>
        <span>Einreichen</span>
      </a>
    </nav>

    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
      <img src="/logo.png" alt="Coach United" class="drawer-logo">
      <a href="/wissen" class="drawer-link">Wissen</a>
      <a href="/ueber-uns" class="drawer-link">Über uns</a>
      <a href="/umgang-mit-ki" class="drawer-link">Umgang mit KI</a>
      <a href="/impressum" class="drawer-link">Impressum</a>
    </div>
  </div>

  <script>
    fetch('https://raw.githubusercontent.com/roberttgreve-web/coachunited-test/main/public/articles.json')
      .then(r => r.json())
      .then(articles => {
        const list = document.getElementById('articles-list');
        if (!articles.length) {
          list.innerHTML = '<div style="padding:40px 0; text-align:center; color:#9aa3b0; font-size:14px;">Noch keine Artikel veröffentlicht.</div>';
          return;
        }
        list.innerHTML = articles.map(a => {
          const thumb = a.foto_url
            ? `<img class="card-thumb" src="${a.foto_url}" alt="${a.titel}" loading="lazy" onerror="this.outerHTML='<div class=card-thumb-placeholder>📖</div>'">`
            : `<div class="card-thumb-placeholder">📖</div>`;
          return `
            <a href="/artikel/${a.url_slug}" class="article-card">
              ${thumb}
              <div class="card-body">
                <p class="card-title">${a.titel}</p>
              </div>
            </a>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('articles-list').innerHTML =
          '<div style="padding:40px 0; text-align:center; color:#9aa3b0; font-size:14px;">Artikel konnten nicht geladen werden.</div>';
      });

    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
    }
  </script>
</body>
</html>
