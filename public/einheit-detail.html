<html lang="de">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="description" content="">
  <meta property="og:type" content="article">
  <meta property="og:title" content="Trainingseinheit | COACH UNITED">
  <meta property="og:description" content="">
  <meta property="og:image" content="https://coachunited.de/og-image.png">

  <meta property="og:site_name" content="COACH UNITED">
  <link rel="canonical" href="">
  <title>Trainingseinheit | COACH UNITED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter Tight', system-ui, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      width: 375px;
      min-height: 100vh;
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
    }

    .header {
      background: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #f0f2f5;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .back-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; cursor: pointer;
      text-decoration: none; color: #1B6BF4;
      font-size: 14px; font-weight: 500; padding: 4px 0;
    }
    .back-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .burger-btn {
      background: none; border: none; cursor: pointer;
      padding: 4px; display: flex; flex-direction: column; gap: 5px;
    }
    .burger-btn span { display: block; width: 22px; height: 2px; background: #333; border-radius: 2px; }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px 100px;
    }

    h1 {
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #0E1430;
      line-height: 1.15;
      letter-spacing: -0.025em;
      margin-bottom: 0;
    }

    .section-label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      font-weight: 600;
      color: #6B7390;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 12px;
    }

    /* ── Phase-Section-Header ── */
    .phase-section { margin-bottom: 8px; }
    .phase-section-header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 24px 0 12px;
    }
    .phase-section:first-child .phase-section-header { padding-top: 4px; }
    .phase-header-bar {
      height: 3px;
      width: 100%;
      border-radius: 2px;
    }
    .phase-header-label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }
    .phase-section-header[data-phase="Aufwärmen"] .phase-header-bar { background: #C2611F; }
    .phase-section-header[data-phase="Aufwärmen"] .phase-header-label { color: #C2611F; }
    .phase-section-header[data-phase="Hauptteil"] .phase-header-bar { background: #0E6A45; }
    .phase-section-header[data-phase="Hauptteil"] .phase-header-label { color: #0E6A45; }
    .phase-section-header[data-phase="Spielformat"] .phase-header-bar { background: #0F3FA8; }
    .phase-section-header[data-phase="Spielformat"] .phase-header-label { color: #0F3FA8; }

    /* ── Einheit Hero (Desktop) ── */
    .einheit-hero { padding: 24px 16px 16px; }

    /* Übungs-Karte innerhalb der Einheit */
    .uebung-card {
      display: flex;
      align-items: stretch;
      text-decoration: none;
      color: inherit;
      background: white;
      border-radius: 12px;
      border: 1px solid #E6E8EF;
      margin-bottom: 8px;
      overflow: hidden;
      transition: box-shadow 0.18s, transform 0.18s;
    }
    .uebung-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.09);
      transform: translateY(-1px);
    }

    .card-position {
      width: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 14px;
      font-weight: 700;
      color: #D0D6E0;
    }

    .card-body {
      flex: 1;
      padding: 13px 12px 13px 0;
      min-width: 0;
    }

    .card-title {
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #0E1430;
      line-height: 1.35;
      letter-spacing: -0.01em;
    }

    .card-image {
      width: 76px;
      flex-shrink: 0;
      overflow: hidden;
      background: #f5f6f9;
    }
    .card-image img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-arrow {
      display: flex;
      align-items: center;
      padding-right: 14px;
      padding-left: 4px;
      color: #B0B8CC;
    }
    .card-arrow svg { width: 16px; height: 16px; }

    #loading { padding: 60px 24px; text-align: center; color: #9aa3b0; font-size: 15px; }
    #not-found { padding: 60px 24px; text-align: center; color: #9aa3b0; font-size: 15px; }
    #not-found a { color: #1B6BF4; text-decoration: none; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 375px; background: white;
      border-top: 1px solid #f0f2f5;
      display: flex; justify-content: space-around;
      padding: 10px 0 14px; z-index: 20;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      border: none; background: none; cursor: pointer;
      padding: 4px; text-decoration: none;
      color: #c0c7d3; transition: color 0.15s;
    }
    .nav-item.active { color: #1B6BF4; }
    .nav-icon { width: 22px; height: 22px; }
    .nav-label { font-size: 10px; font-weight: 500; }

    /* Drawer */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 40; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; top: 0; right: -280px; width: 260px; height: 100vh; background: white; z-index: 50; padding: 32px 24px; transition: right 0.25s ease; box-shadow: -8px 0 32px rgba(0,0,0,0.12); }
    .drawer.open { right: 0; }
    .drawer-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: #555; padding: 4px; }
    .drawer-logo { width: 48px; margin-bottom: 28px; }
    .drawer-link { display: block; padding: 12px 0; font-size: 15px; font-weight: 500; color: #1a1a2e; text-decoration: none; border-bottom: 1px solid #f0f2f5; }
    .drawer-link:last-child { border-bottom: none; }
    .drawer-link:hover { color: #1B6BF4; }
  </style>
  <link rel="stylesheet" href="/desktop.css">
  <script src="/desktop-nav.js" defer></script>
</head>
<body>
  <div class="container">

    <header class="header">
      <a href="/einheiten" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Einheiten
      </a>
      <button class="burger-btn" onclick="openDrawer()">
        <span></span><span></span><span></span>
      </button>
    </header>

    <div id="loading">Einheit wird geladen…</div>
    <div id="not-found" style="display:none;">
      <p>Einheit nicht gefunden.</p><br>
      <a href="/einheiten">← Zurück zur Übersicht</a>
    </div>

    <div id="einheit-content" style="display:none; flex:1; flex-direction:column;">
      <div class="einheit-hero">
        <h1 id="titel"></h1>
      </div>
      <div class="content">
        <p class="section-label" id="einheit-count"></p>
        <div id="uebungen-list"></div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="/uebungen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
        </svg>
        <span class="nav-label">Übungen</span>
      </a>
      <a href="/einheiten" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
        <span class="nav-label">Einheiten</span>
      </a>
      <a href="/whatsapp-info" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="nav-label">WhatsApp-Kanal</span>
      </a>
      <a href="/uebung-einreichen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
        <span class="nav-label">Einreichen</span>
      </a>
    </nav>

    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
      <img src="/logo.png" alt="Coach United" class="drawer-logo">
      <a href="/wissen" class="drawer-link">Wissen</a>
      <a href="/ueber-uns" class="drawer-link">Über uns</a>
      <a href="/impressum" class="drawer-link">Impressum</a>
    </div>
  </div>

  <script>
    const slug = window.location.pathname.replace(/^\/einheit\//, '').replace(/\/$/, '');
    const EINHEITEN_URL = 'https://raw.githubusercontent.com/roberttgreve-web/coachunited-test/main/public/einheiten.json';
    const EXERCISES_URL = 'https://raw.githubusercontent.com/roberttgreve-web/coachunited-test/main/public/exercises.json';

    const PHASE_ORDER = ['Aufwärmen', 'Hauptteil', 'Spielformat'];

    function renderCard(u, grafikMap) {
      const grafik = grafikMap[u.slug] || '';
      return `
        <a href="/uebung/${u.slug}?from=${slug}" class="uebung-card">
          <div class="card-position">${u.position}</div>
          <div class="card-body">
            <p class="card-title">${u.titel}</p>
          </div>
          ${grafik ? `<div class="card-image"><img src="${grafik}" alt="" loading="lazy"></div>` : ''}
          <div class="card-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </a>`;
    }

    Promise.all([fetch(EINHEITEN_URL).then(r => r.json()), fetch(EXERCISES_URL).then(r => r.json())])
      .then(([einheiten, exercises]) => {
        const grafikMap = {};
        exercises.forEach(e => { if (e.slug && e.grafik_url) grafikMap[e.slug] = e.grafik_url; });

        const einheit = einheiten.find(e => e.url_slug === slug);
        if (!einheit) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('not-found').style.display = 'block';
          return;
        }

        const pageTitle = einheit.titel + ' | COACH UNITED';
        document.title = pageTitle;
        document.getElementById('titel').textContent = einheit.titel;

        // Meta-Tags
        const canonicalUrl = 'https://coachunited.de/einheit/' + einheit.url_slug + '/';
        const metaDesc  = document.querySelector('meta[name="description"]');
        const ogTitle   = document.querySelector('meta[property="og:title"]');
        const ogDesc    = document.querySelector('meta[property="og:description"]');
        const ogUrl     = document.querySelector('meta[property="og:url"]');
        const canonical = document.querySelector('link[rel="canonical"]');
        const descText  = einheit.beschreibung ? einheit.beschreibung.slice(0, 155) : (einheit.titel + ' – komplette Fußball-Trainingseinheit für den Kinderfußball bei COACH UNITED.');
        if (metaDesc)  metaDesc.setAttribute('content', descText);
        if (ogTitle)   ogTitle.setAttribute('content', pageTitle);
        if (ogDesc)    ogDesc.setAttribute('content', descText);
        if (ogUrl)     ogUrl.setAttribute('content', canonicalUrl);
        if (canonical) canonical.setAttribute('href', canonicalUrl);

        const count = einheit.uebungen.length;
        document.getElementById('einheit-count').textContent = count + ' Übung' + (count !== 1 ? 'en' : '');

        // Gruppiere nach Phase
        const grouped = {};
        PHASE_ORDER.forEach(p => { grouped[p] = []; });
        einheit.uebungen.forEach(u => {
          const phase = u.phase || 'Hauptteil';
          if (!grouped[phase]) grouped[phase] = [];
          grouped[phase].push(u);
        });

        const list = document.getElementById('uebungen-list');
        list.innerHTML = PHASE_ORDER
          .filter(p => grouped[p] && grouped[p].length)
          .map(phase => `
            <div class="phase-section">
              <div class="phase-section-header" data-phase="${phase}">
                <div class="phase-header-bar"></div>
                <span class="phase-header-label">${phase}</span>
              </div>
              ${grouped[phase].map(u => renderCard(u, grafikMap)).join('')}
            </div>`).join('');

        document.getElementById('loading').style.display = 'none';
        document.getElementById('einheit-content').style.display = 'flex';
      })
      .catch(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('not-found').style.display = 'block';
      });

    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
    }
  </script>
</body>
</html>
