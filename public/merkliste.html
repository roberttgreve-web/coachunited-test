<!DOCTYPE html>
<html lang="de">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5D2HZBJESR"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5D2HZBJESR');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="description" content="Deine gespeicherten Übungen und Trainingseinheiten auf einen Blick.">
  <title>Merkliste | COACH UNITED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter Tight', system-ui, sans-serif;
      background: #f0eee9;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      width: 375px;
      min-height: 100vh;
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.14);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #E6E8EF;
      position: sticky; top: 0; z-index: 20;
    }
    .logo-link { display: flex; align-items: center; text-decoration: none; }
    .logo-link img { height: 40px; width: auto; object-fit: contain; }
    .burger-btn { background: none; border: none; cursor: pointer; padding: 6px; display: flex; flex-direction: column; gap: 5px; }
    .burger-btn span { display: block; width: 22px; height: 2px; background: #0E1430; border-radius: 2px; }

    /* ── Page Hero ── */
    .page-hero {
      background: #0E1430;
      padding: 22px 22px 24px;
    }
    .page-title {
      font-size: 22px; font-weight: 800; color: #fff;
      letter-spacing: -0.02em; margin-bottom: 4px;
    }
    .page-subtitle {
      font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.5;
    }

    /* ── Mobile Tabs ── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid #E6E8EF;
      background: #fff;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 0;
      background: none;
      border: none;
      border-bottom: 2.5px solid transparent;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #6B7390;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }
    .tab-btn.active {
      color: #1E6BFF;
      border-bottom-color: #1E6BFF;
    }

    /* ── Sections ── */
    .merkliste-section {
      padding: 20px 16px 0;
    }
    .section-label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px; font-weight: 600; color: #6B7390;
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 12px;
    }
    .card-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── Cards ── */
    .saved-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 14px;
      border: 1.5px solid #E6E8EF; background: #fff;
      text-decoration: none; transition: border-color 0.15s, background 0.15s;
    }
    .saved-card:hover { border-color: #1E6BFF; background: #f7f9ff; }
    .saved-card-body { flex: 1; min-width: 0; }
    .saved-card-meta { font-size: 11px; font-weight: 600; color: #9aa3b0; margin-bottom: 6px; }
    .saved-card-exercise {
      font-size: 14px; font-weight: 700; color: #0E1430;
      padding: 2px 0 2px 8px;
      border-left: 3px solid #1E6BFF;
      margin-left: 2px;
    }
    .saved-card-img {
      width: 64px; height: 64px; object-fit: cover;
      border-radius: 8px; flex-shrink: 0; background: #f0eee9;
    }
    .saved-card-desc {
      font-size: 13px; font-weight: 400; color: #6B7390;
      margin-top: 4px; line-height: 1.4;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .saved-card-del {
      background: none; border: none; cursor: pointer; padding: 4px;
      color: #c0c8d8; transition: color 0.15s; flex-shrink: 0; align-self: flex-start;
    }
    .saved-card-del:hover { color: #e05050; }

    /* ── Empty State ── */
    .empty-state {
      padding: 40px 20px;
      text-align: center;
    }
    .empty-state-icon {
      width: 48px; height: 48px;
      margin: 0 auto 16px;
      color: #c0c8d8;
    }
    .empty-state-title {
      font-size: 15px; font-weight: 700; color: #0E1430;
      margin-bottom: 8px;
    }
    .empty-state-text {
      font-size: 13px; color: #9aa3b0; line-height: 1.5;
    }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 375px; background: #fff; border-top: 1px solid #E6E8EF;
      display: flex; padding: 10px 0 24px; z-index: 20;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.05);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      border: none; background: none; cursor: pointer; padding: 4px; text-decoration: none;
      color: #6B7390; font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.01em; transition: color 0.15s;
    }
    .nav-item.active { color: #1E6BFF; }
    .nav-icon { width: 22px; height: 22px; }

    /* ── Drawer ── */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 40; }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: -280px; width: 260px; height: 100vh;
      background: #fff; z-index: 50; padding: 32px 24px;
      transition: right 0.25s ease; box-shadow: -8px 0 32px rgba(0,0,0,0.12);
    }
    .drawer.open { right: 0; }
    .drawer-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: #555; padding: 4px; }
    .drawer-logo { width: 36px; margin-bottom: 28px; }
    .drawer-link { display: block; padding: 12px 0; font-family: 'Inter Tight', system-ui, sans-serif; font-size: 15px; font-weight: 600; color: #1a1a2e; text-decoration: none; border-bottom: 1px solid #f0f2f5; }
    .drawer-link:last-child { border-bottom: none; }
    .drawer-link:hover { color: #1E6BFF; }

    /* ── Spacer for nav ── */
    .nav-spacer { height: 90px; flex-shrink: 0; }

    /* ── Desktop: show both sections, hide tabs ── */
    @media (min-width: 768px) {
      .tab-bar { display: none; }
      .merkliste-section { display: block !important; }
      .merkliste-section + .merkliste-section { margin-top: 8px; }
    }
  </style>
  <link rel="stylesheet" href="/desktop.css">
  <script src="/desktop-nav.js" defer></script>
</head>
<body>
  <div class="container">

    <header class="header">
      <a href="/home" class="logo-link">
        <img src="/logo.png" alt="Coach United">
      </a>
      <button class="burger-btn" onclick="openDrawer()">
        <span></span><span></span><span></span>
      </button>
    </header>

    <div class="page-hero">
      <h1 class="page-title">Merkliste</h1>
      <p class="page-subtitle">Deine gespeicherten Einheiten und Übungen.</p>
    </div>

    <!-- Mobile Tab Bar -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-einheiten" onclick="switchTab('einheiten')">Einheiten</button>
      <button class="tab-btn" id="tab-uebungen" onclick="switchTab('uebungen')">Übungen</button>
    </div>

    <!-- Einheiten Section -->
    <div class="merkliste-section" id="section-einheiten">
      <div class="section-label">Gespeicherte Einheiten</div>
      <div class="card-list" id="einheiten-list"></div>
    </div>

    <!-- Übungen Section -->
    <div class="merkliste-section" id="section-uebungen" style="display:none;">
      <div class="section-label">Gespeicherte &#220;bungen</div>
      <div class="card-list" id="uebungen-list"></div>
    </div>

    <div class="nav-spacer"></div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="/uebungen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4 L6 17 L16 17 Z"/><line x1="7.5" y1="11" x2="14.5" y2="11"/><line x1="4.5" y1="17" x2="17.5" y2="17"/>
        </svg>
        <span>Alle &#220;bungen</span>
      </a>
      <a href="/einheiten" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="3" width="14" height="16" rx="2"/><line x1="7" y1="8" x2="15" y2="8"/><line x1="7" y1="12" x2="15" y2="12"/><line x1="7" y1="16" x2="12" y2="16"/>
        </svg>
        <span>Einheit erhalten</span>
      </a>
      <a href="/merkliste" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 3h12a1 1 0 011 1v15l-6-3-6 3V4a1 1 0 011-1z"/>
        </svg>
        <span>Merkliste</span>
      </a>
      <a href="/whatsapp-info" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6a2 2 0 012-2h10a2 2 0 012 2v7a2 2 0 01-2 2H9l-4 3v-3H6a2 2 0 01-2-2z"/>
        </svg>
        <span>WhatsApp-Kanal</span>
      </a>
    </nav>

    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
      <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
      <img src="/logo.png" alt="Coach United" class="drawer-logo">
      <span class="drawer-section-label">&#220;bungen entdecken</span>
      <a href="/uebungen/alter" class="drawer-link">&#220;bungen nach Alter</a>
      <a href="/uebungen/skill" class="drawer-link">&#220;bungen nach Skill</a>
      <a href="/uebungen/phase" class="drawer-link">&#220;bungen nach Phase</a>
      <div class="drawer-divider"></div>
      <a href="/wissen" class="drawer-link">Wissen</a>
      <a href="/uebung-einreichen" class="drawer-link">&#220;bung einreichen</a>
      <a href="/ueber-uns" class="drawer-link">&#220;ber uns</a>
      <a href="/umgang-mit-ki" class="drawer-link">Umgang mit KI</a>
      <a href="/impressum" class="drawer-link">Impressum</a>
    </div>

  </div>

  <script>
    const trashIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
    </svg>`;

    const emptyEinheitenHtml = `
      <div class="empty-state">
        <svg class="empty-state-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="10" y="6" width="28" height="36" rx="4"/>
          <line x1="16" y1="16" x2="32" y2="16"/>
          <line x1="16" y1="22" x2="32" y2="22"/>
          <line x1="16" y1="28" x2="24" y2="28"/>
        </svg>
        <p class="empty-state-title">Noch nichts gespeichert.</p>
        <p class="empty-state-text">Geh zu "Einheit erhalten", stelle eine Einheit zusammen und tippe auf "Speichern".</p>
      </div>`;

    const emptyUebungenHtml = `
      <div class="empty-state">
        <svg class="empty-state-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 6h24a2 2 0 012 2v32l-14-7-14 7V8a2 2 0 012-2z"/>
        </svg>
        <p class="empty-state-title">Noch nichts gespeichert.</p>
        <p class="empty-state-text">&#214;ffne eine &#220;bung und tippe auf "Speichern", um sie hier wiederzufinden.</p>
      </div>`;

    // ── Einheiten ────────────────────────────────────
    function renderEinheiten() {
      const saved = JSON.parse(localStorage.getItem('cu_saved_einheiten') || '[]');
      const list = document.getElementById('einheiten-list');
      if (!saved.length) {
        list.innerHTML = emptyEinheitenHtml;
        return;
      }
      list.innerHTML = saved.map((entry, i) => {
        const date = new Date(entry.savedAt);
        const label = date.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
        const titlesHtml = (entry.exerciseTitles || [])
          .map(t => `<div class="saved-card-exercise">${t}</div>`).join('');
        return `
          <a href="${entry.url}" class="saved-card">
            <div class="saved-card-body">
              <div class="saved-card-meta">${label}</div>
              ${titlesHtml}
            </div>
            <button class="saved-card-del" onclick="deleteEinheit(event, ${i})" title="L&#246;schen">
              ${trashIcon}
            </button>
          </a>`;
      }).join('');
    }

    function deleteEinheit(e, i) {
      e.preventDefault();
      e.stopPropagation();
      const saved = JSON.parse(localStorage.getItem('cu_saved_einheiten') || '[]');
      saved.splice(i, 1);
      localStorage.setItem('cu_saved_einheiten', JSON.stringify(saved));
      renderEinheiten();
    }

    // ── Übungen ────────────────────────────────────
    function renderUebungen() {
      const saved = JSON.parse(localStorage.getItem('cu_saved_uebungen') || '[]');
      const list = document.getElementById('uebungen-list');
      if (!saved.length) {
        list.innerHTML = emptyUebungenHtml;
        return;
      }
      list.innerHTML = saved.map((entry, i) => {
        const date = new Date(entry.savedAt);
        const label = date.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
        return `
          <a href="${entry.url}" class="saved-card">
            ${entry.grafik_url ? `<img class="saved-card-img" src="${entry.grafik_url}" alt="${entry.titel || ''}">` : ''}
            <div class="saved-card-body">
              <div class="saved-card-meta">${label}</div>
              <div class="saved-card-exercise">${entry.titel || ''}</div>
              ${entry.kurzbeschreibung ? `<div class="saved-card-desc">${entry.kurzbeschreibung}</div>` : ''}
            </div>
            <button class="saved-card-del" onclick="deleteUebung(event, ${i})" title="L&#246;schen">
              ${trashIcon}
            </button>
          </a>`;
      }).join('');
    }

    function deleteUebung(e, i) {
      e.preventDefault();
      e.stopPropagation();
      const saved = JSON.parse(localStorage.getItem('cu_saved_uebungen') || '[]');
      saved.splice(i, 1);
      localStorage.setItem('cu_saved_uebungen', JSON.stringify(saved));
      renderUebungen();
    }

    // ── Tab switching (mobile only) ────────────────
    function switchTab(tab) {
      const isEinheiten = tab === 'einheiten';
      document.getElementById('section-einheiten').style.display = isEinheiten ? 'block' : 'none';
      document.getElementById('section-uebungen').style.display = isEinheiten ? 'none' : 'block';
      document.getElementById('tab-einheiten').classList.toggle('active', isEinheiten);
      document.getElementById('tab-uebungen').classList.toggle('active', !isEinheiten);
    }

    // ── Drawer ────────────────────────────────────
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
    }

    // ── Init ────────────────────────────────────
    renderEinheiten();
    renderUebungen();
  </script>
</body>
</html>
