  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: 'Inter Tight', system-ui, sans-serif; background: #f0eee9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }

    .container { width: 375px; min-height: 100vh; background: #fff; border-radius: 28px; overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,0.14); display: flex; flex-direction: column; }

    /* ── Header ── */
    .header {
      background: #fff;
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #E6E8EF;
      position: sticky; top: 0; z-index: 20;
    }
    .logo-link { display: flex; align-items: center; text-decoration: none; }
    .logo-link img { height: 40px; width: auto; object-fit: contain; }
    .burger-btn { background: none; border: none; cursor: pointer; padding: 6px; display: flex; flex-direction: column; gap: 5px; }
    .burger-btn span { display: block; width: 22px; height: 2px; background: #0E1430; border-radius: 2px; }

    /* ── Page Hero ── */
    .page-hero { background: #0E1430; padding: 14px 18px 18px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.55);
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 13px; font-weight: 600; padding: 0; margin-bottom: 14px;
      transition: color 0.15s;
    }
    .back-btn:hover { color: #fff; }
    .hero-title {
      font-size: 24px; font-weight: 800; color: #fff;
      letter-spacing: -0.02em; line-height: 1.2; margin: 0 0 14px;
    }

    /* ── Kriterien-Bar ── */
    .criteria-bar {
      display: flex; gap: 8px; flex-wrap: wrap;
      position: relative;
    }
    .crit-wrap { position: relative; }
    .crit-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 999px;
      color: #fff;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .crit-pill:hover { background: rgba(255,255,255,0.2); }
    .crit-pill svg { opacity: 0.7; transition: transform 0.15s; }
    .crit-wrap.open .crit-pill svg { transform: rotate(180deg); }
    .crit-pill-clear {
      opacity: 0.6; font-size: 14px; line-height: 1;
      background: none; border: none; color: inherit; cursor: pointer; padding: 0;
    }
    .crit-pill-clear:hover { opacity: 1; }
    .crit-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px); left: 0;
      min-width: 160px;
      background: #fff; border-radius: 10px;
      padding: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
      z-index: 50;
    }
    .crit-wrap.open .crit-dropdown { display: block; }
    .crit-option {
      display: block; width: 100%;
      padding: 9px 12px; border: none; background: none;
      text-align: left; border-radius: 6px;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 14px; font-weight: 600; color: #0E1430;
      cursor: pointer; transition: background 0.12s;
    }
    .crit-option:hover { background: #f0f4ff; }
    .crit-option.active { background: #EEF3FF; color: #1E6BFF; }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 20px 16px 100px; }

    /* ── Session Meta ── */
    .session-meta { margin-bottom: 20px; }

    .session-title {
      font-size: 22px; font-weight: 800; color: #0E1430;
      letter-spacing: -0.02em; margin-bottom: 10px;
    }

    .session-badges { display: flex; flex-wrap: wrap; gap: 6px; }

    .session-badge {
      padding: 4px 10px; border-radius: 8px;
      font-size: 12px; font-weight: 600;
    }
    .badge-jugend { background: rgba(30,107,255,0.1); color: #1E6BFF; }
    .badge-skill  { background: rgba(14,106,69,0.1); color: #0E6A45; }

    /* ── Exercise Cards ── */
    .ex-card-list { display: flex; flex-direction: column; gap: 14px; }

    .ex-card {
      border-radius: 16px; overflow: hidden;
      background: #fff;
      border-top: 4px solid #E6E8EF;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .phase-aufwaermen { border-top-color: #C2611F; }
    .phase-hauptteil  { border-top-color: #0E6A45; }
    .phase-spielformat{ border-top-color: #0F3FA8; }

    .ex-card-header {
      width: 100%; padding: 18px 18px 16px;
      background: #fff; border: none; cursor: pointer;
      text-align: left; position: relative; transition: background 0.15s;
    }
    .ex-card-header:hover { background: #fafbfd; }

    .ex-badges { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }

    .ex-phase-badge {
      padding: 4px 10px; border-radius: 6px;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 10px; font-weight: 700; color: #fff;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .ex-jugend-badge {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px; font-weight: 700;
      padding: 4px 9px; background: #EEF1F6;
      color: #0E1430; border-radius: 4px; letter-spacing: 0.05em;
    }

    .ex-card-title {
      font-size: 22px; font-weight: 800; color: #0E1430;
      letter-spacing: -0.02em; line-height: 1.1;
      margin-bottom: 8px; padding-right: 30px;
    }
    .ex-card-desc {
      font-size: 16px; color: #3B4565; line-height: 1.65;
    }
    .ex-chevron {
      position: absolute; top: 20px; right: 16px;
      color: #b0b8c8; transition: transform 0.22s ease;
    }
    .ex-card.open .ex-chevron { transform: rotate(180deg); }

    /* ── Card Body ── */
    .ex-card-body { max-height: 0; overflow: hidden; transition: max-height 0.32s ease; }
    .ex-card.open .ex-card-body { max-height: 1400px; }

    .ex-img {
      width: 100%; max-height: 140px; object-fit: contain;
      background: #f7f9ff; display: block;
      border-top: 1px solid #f0f2f5;
      padding: 10px 16px; box-sizing: border-box;
    }

    .ex-skills {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 14px 18px 16px;
      border-bottom: 1px solid #f0f2f5;
    }
    .ex-skill-tag {
      padding: 5px 12px; border-radius: 999px;
      background: #FF4D1F; color: #fff;
      font-family: 'Inter Tight', system-ui, sans-serif;

    }

    .ex-section { padding: 16px 18px; border-top: 1px solid #f0f2f5; }
    .ex-section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .ex-section-dot {
      width: 10px; height: 10px; border-radius: 50%;

    .ex-section-title { font-size: 16px; font-weight: 700; color: #0E1430; letter-spacing: -0.01em; }
    .ex-section-text { font-size: 16px; color: #3B4565; line-height: 1.75; white-space: pre-line; }

    .ex-detail-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin: 14px 18px 18px;
      color: #1E6BFF; font-size: 14px; font-weight: 700;
      text-decoration: none;
      padding: 10px 16px; border: 1.5px solid rgba(30,107,255,0.3);
      border-radius: 10px; transition: background 0.15s;
    }
    .ex-detail-link:hover { background: #f0f5ff; }

    /* ── Reroll ── */
    .reroll-wrap { margin-top: 16px; }

    .reroll-btn {
      width: 100%; padding: 16px;
      border: 1.5px solid rgba(30,107,255,0.4);
      border-radius: 14px; background: rgba(30,107,255,0.08);
      color: #5b9bff;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.18s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .reroll-btn:hover { background: rgba(30,107,255,0.15); transform: translateY(-1px); }
    .reroll-btn:disabled { border-color: rgba(0,0,0,0.1); color: rgba(0,0,0,0.25); background: transparent; cursor: default; transform: none; }

    .no-variations {
      text-align: center; font-size: 12px;
      color: #9aa3b0; margin-top: 8px;
    }

    /* ── Phasen-Header (mobil) ── */
    .gen-phase-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 10px;
    }
    .gen-phase-header:first-child { margin-top: 0; }
    .gen-phase-bar {
      flex: 1;
      height: 3px;
      border-radius: 2px;
    }
    .gen-phase-label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #6B7390;
      flex-shrink: 0;
    }

    /* ── Empty / Error ── */
    .empty-state {
      text-align: center; padding: 48px 24px;
      color: #9aa3b0; font-size: 14px; line-height: 1.6;
    }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 375px; background: #fff; border-top: 1px solid #E6E8EF;
      display: flex; padding: 10px 0 24px; z-index: 20;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.05);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      border: none; background: none; cursor: pointer; padding: 4px; text-decoration: none;
      color: #6B7390; font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.01em; transition: color 0.15s;
    }
    .nav-item.active { color: #1E6BFF; }
    .nav-icon { width: 22px; height: 22px; }

    /* ── Drawer ── */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 40; }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: -280px; width: 260px; height: 100vh;
      background: #fff; z-index: 50; padding: 32px 24px;
      transition: right 0.25s ease; box-shadow: -8px 0 32px rgba(0,0,0,0.12);
    }
    .drawer.open { right: 0; }
    .drawer-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: #555; padding: 4px; }
    .drawer-logo { width: 36px; margin-bottom: 28px; }
    .drawer-link { display: block; padding: 12px 0; font-family: 'Inter Tight', system-ui, sans-serif; font-size: 15px; font-weight: 600; color: #1a1a2e; text-decoration: none; border-bottom: 1px solid #f0f2f5; }
    .drawer-link:last-child { border-bottom: none; }
    .drawer-link:hover { color: #1E6BFF; }

    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
      <img src="/logo.png" alt="Coach United" class="drawer-logo">
      <a href="/wissen" class="drawer-link">Wissen</a>
      <a href="/ueber-uns" class="drawer-link">Über uns</a>

  <script>
    const params = new URLSearchParams(window.location.search);
    const jugend = params.get('jugend');
    const skill  = params.get('skill') || null;

    let allExercises = [];
    let currentKey   = null;

    if (!jugend) window.location.href = '/home';

    // ── Kriterien-Bar ─────────────────────────────────────────────
    const JUGEND_OPTIONS = ['G-Jugend','F-Jugend','E-Jugend','D-Jugend'];
    const chevronSvg = `<svg width="10" height="10" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`;

    function buildCriteriaBar(skillOptions) {
      const bar = document.getElementById('criteria-bar');
      const jugendOpts = JUGEND_OPTIONS.map(j =>
        `<button class="crit-option${j === jugend ? ' active' : ''}" onclick="changeCrit('jugend','${j}')">${j}</button>`
      ).join('');

      const skillOpts = skillOptions.map(s =>
        `<button class="crit-option${s === skill ? ' active' : ''}" onclick="changeCrit('skill','${s}')">${s}</button>`
      ).join('');

      const skillClearBtn = skill
        ? `<button class="crit-pill-clear" onclick="changeCrit('skill',null)" title="Skill entfernen">✕</button>` : '';
      const skillLabel = skill || 'Alle Skills';

      bar.innerHTML = `
        <div class="crit-wrap" id="crit-wrap-jugend">
          <button class="crit-pill" onclick="toggleCritDrop('jugend')">
            ${jugend} ${chevronSvg}
          </button>
          <div class="crit-dropdown">${jugendOpts}</div>
        </div>
        <div class="crit-wrap" id="crit-wrap-skill">
          <button class="crit-pill" onclick="toggleCritDrop('skill')">
            ${skillLabel} ${chevronSvg}
          </button>
          ${skillClearBtn}
          <div class="crit-dropdown">${skillOpts}</div>
        </div>`;

      document.addEventListener('click', e => {
        if (!e.target.closest('.crit-wrap')) {
          document.querySelectorAll('.crit-wrap').forEach(w => w.classList.remove('open'));
        }
      });
    }

    function toggleCritDrop(key) {
      const wrap = document.getElementById('crit-wrap-' + key);
      const wasOpen = wrap.classList.contains('open');
      document.querySelectorAll('.crit-wrap').forEach(w => w.classList.remove('open'));
      if (!wasOpen) wrap.classList.add('open');
    }

    function changeCrit(key, value) {
      const newJugend = key === 'jugend' ? value : jugend;
      const newSkill  = key === 'skill'  ? value : (key === 'skill-clear' ? null : skill);
      let url = '/einheit-generator?jugend=' + encodeURIComponent(newJugend);
      if (newSkill) url += '&skill=' + encodeURIComponent(newSkill);
      window.location.href = url;
    }

    // ── Phasen-Konfiguration ──────────────────────────────────────
    const PHASES = [
      { key: 'aufwaermen',  label: 'Aufwärmen',   match: 'Aufwärmen'   },
      { key: 'hauptteil',   label: 'Hauptteil',   match: 'Hauptteil'   },
      { key: 'spielformat', label: 'Spielformat',  match: 'Spielformat' },
    ];

    // ── Algorithmus ───────────────────────────────────────────────
    function makeClusters(exercises) {
      const visited = new Set();
      const clusters = [];
      for (const ex of exercises) {
        if (visited.has(ex.id)) continue;
        visited.add(ex.id);
        const sisters = exercises.filter(o =>
          !visited.has(o.id) && (ex.schwester_ids || []).includes(o.id)
        );
        sisters.forEach(s => visited.add(s.id));
        clusters.push([ex, ...sisters]);
      }
      return clusters;
    }

    function clusterMatchesSkill(cluster, s) {
      if (!s) return true;
      return cluster.some(e => (e.skills || []).includes(s));
    }

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function sessionKey(exercises) {
      return exercises.map(e => e.id).join('-');
    }

    // ── Verlaufs-Gedächtnis ───────────────────────────────────────
    const HIST_KEY = `gen_hist_${jugend}`;
    const HIST_MAX = 8;

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(HIST_KEY) || '{}'); }
      catch(e) { return {}; }
    }

    function saveToHistory(exs) {
      const hist = loadHistory();
      for (const ex of exs) {
        const ph = ex.trainingsphase;
        if (!hist[ph]) hist[ph] = [];
        if (!hist[ph].includes(ex.id)) hist[ph].unshift(ex.id);
        hist[ph] = hist[ph].slice(0, HIST_MAX);
      }
      localStorage.setItem(HIST_KEY, JSON.stringify(hist));
    }

    function generateSession(exercises, excludeKey) {
      const valid = exercises.filter(e =>
        e.status === 'veroeffentlicht' && (e.jugend || []).includes(jugend)
      );

      // Global BFS: group exercises by sister links across all phases
      const visited = new Set();
      const superClusters = [];
      for (const ex of valid) {
        if (visited.has(ex.id)) continue;
        visited.add(ex.id);
        const group = [ex];
        for (let i = 0; i < group.length; i++) {
          valid.filter(o => !visited.has(o.id) && (group[i].schwester_ids || []).includes(o.id))
               .forEach(s => { visited.add(s.id); group.push(s); });
        }
        if (!clusterMatchesSkill(group, skill)) continue;
        const byPhase = {};
        group.forEach(e => {
          if (!byPhase[e.trainingsphase]) byPhase[e.trainingsphase] = [];
          byPhase[e.trainingsphase].push(e);
        });
        superClusters.push({ byPhase });
      }

      const phaseOptions = {};
      PHASES.forEach(p => {
        phaseOptions[p.key] = superClusters.filter(sc => sc.byPhase[p.match]);
      });

      if (PHASES.some(p => !phaseOptions[p.key].length)) return null;

      const history = loadHistory();

      function buildSession(avoidHistory) {
        const assignment = {};
        const used = new Set();
        for (const p of PHASES) {
          if (assignment[p.key]) continue;
          const candidates = phaseOptions[p.key].filter(sc => !used.has(sc));
          if (!candidates.length) return null;
          let pool = candidates;
          if (avoidHistory) {
            const recentIds = new Set(history[p.match] || []);
            const fresh = candidates.filter(sc => !sc.byPhase[p.match]?.some(e => recentIds.has(e.id)));
            if (fresh.length > 0) pool = fresh;
          }
          const chosen = pool[Math.floor(Math.random() * pool.length)];
          used.add(chosen);
          PHASES.forEach(ph => {
            if (chosen.byPhase[ph.match] && !assignment[ph.key])
              assignment[ph.key] = chosen;
          });
        }
        return PHASES.flatMap(p => assignment[p.key]?.byPhase[p.match] || []);
      }

      // Zuerst: frische Übungen + anderer Key (40 Versuche)
      for (let i = 0; i < 40; i++) {
        const s = buildSession(true);
        if (!s) break;
        const k = sessionKey(s);
        if (k !== excludeKey) return { exercises: s, key: k, canReroll: true };
      }

      // Fallback: ohne History-Filter, aber anderer Key
      for (let i = 0; i < 20; i++) {
        const s = buildSession(false);
        if (!s) continue;
        const k = sessionKey(s);
        if (k !== excludeKey) return { exercises: s, key: k, canReroll: true };
      }

      const fallback = buildSession(false);
      if (!fallback) return null;
      return { exercises: fallback, key: sessionKey(fallback), canReroll: false };
    }

    // ── Render ────────────────────────────────────────────────────
    function renderSession(session) {
      if (!session) {
        document.getElementById('session-meta').innerHTML = '';
        document.getElementById('session-list').innerHTML =
          '<div class="empty-state">Für diese Kombination sind nicht genug Übungen vorhanden.</div>';
        document.getElementById('reroll-btn').disabled = true;
        return;
      }

      currentKey = session.key;
      document.getElementById('reroll-btn').disabled = !session.canReroll;
      document.getElementById('no-variations').style.display = session.canReroll ? 'none' : 'block';

      const skillBadge = skill
        ? `<span class="session-badge badge-skill">Fokus: ${skill}</span>` : '';
      const badges = [
        `<span class="session-badge badge-jugend">${jugend}</span>`,
        skillBadge,
      ].filter(Boolean).join('');
      document.getElementById('session-meta').innerHTML = badges
        ? `<div class="session-badges">${badges}</div>` : '';

      // Phasen-Farben: Desktop vs. Mobile
      const isDesktop = window.innerWidth >= 768;
      const phaseColors = isDesktop
        ? { aufwaermen: '#0F3FA8', hauptteil: '#1E6BFF', spielformat: '#00B85C' }
        : { aufwaermen: '#C2611F', hauptteil: '#0E6A45', spielformat: '#0F3FA8' };

      // Übungen nach Phasen gruppieren
      const grouped = {};
      PHASES.forEach(p => { grouped[p.key] = []; });
      session.exercises.forEach((ex, i) => {
        const phaseKey = PHASES.find(p => p.match === ex.trainingsphase)?.key || 'hauptteil';
        grouped[phaseKey].push({ ex, i });
      });

      const activePhases = PHASES.filter(p => grouped[p.key].length);

      document.getElementById('session-list').innerHTML = activePhases
        .map((p, phaseIdx) => {
          const color = phaseColors[p.key] || '#0E1430';
          const header = `
            <div class="gen-phase-header gen-phase-${p.key}" id="dr-phase-${phaseIdx}">
              <div class="gen-phase-bar" style="background:${color}"></div>
              <span class="gen-phase-label">${p.label}</span>
            </div>`;
          const cards = grouped[p.key].map(({ ex, i }) => renderAccordionItem(ex, i, phaseColors)).join('');
          return header + cards;
        }).join('');

      // Sidebar befüllen
      const sidebar = document.getElementById('dr-sidebar');
      if (sidebar) {
        const phaseLinks = activePhases.map((p, phaseIdx) => {
          const color = phaseColors[p.key] || '#0E1430';
          const exLinks = grouped[p.key].map(({ ex }) =>
            `<a href="#dr-ex-${ex.id}" class="dr-sidebar-ex-link">${ex.titel}</a>`
          ).join('');
          return `
            <div class="dr-sidebar-phase">
              <a href="#dr-phase-${phaseIdx}" class="dr-sidebar-phase-link">
                <span class="dr-sidebar-dot" style="background:${color}"></span>
                <span>${p.label}</span>
              </a>
              ${exLinks}
            </div>`;
        }).join('');

        sidebar.innerHTML = `
          <div class="dr-sidebar-section">
            <div class="dr-sidebar-label">Inhalt</div>
            <div class="dr-sidebar-phases">${phaseLinks}</div>
          </div>
          <div class="dr-sidebar-section">
            <div class="dr-sidebar-label">Aktionen</div>
            <div class="dr-sidebar-actions">
              <button class="dr-sidebar-action-btn" onclick="window.print()">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 6V2h8v4M4 12H3a1 1 0 01-1-1V8a2 2 0 012-2h8a2 2 0 012 2v3a1 1 0 01-1 1h-1M4 10h8v4H4z"/>
                </svg>
                Drucken
              </button>
            </div>
          </div>`;
      }

      const first = document.querySelector('.ex-card');
      if (first && !isDesktop) first.classList.add('open');
      requestAnimationFrame(() => {
        const c = document.querySelector('.content');
        if (c) c.scrollTop = 0;
      });
    }

    function renderAccordionItem(ex, index, phaseColors) {
      const phaseKey = PHASES.find(p => p.match === ex.trainingsphase)?.key || 'hauptteil';
      const phaseLabel = PHASES.find(p => p.match === ex.trainingsphase)?.label || ex.trainingsphase;
      const backUrl = encodeURIComponent(window.location.href);
      const href = ex.url_slug ? `/uebung/${ex.url_slug}?back=${backUrl}` : null;

      const _colors = phaseColors || { aufwaermen: '#C2611F', hauptteil: '#0E6A45', spielformat: '#0F3FA8' };
      const phaseColor = _colors[phaseKey] || '#0E1430';

      const jugendStr = (ex.jugend || []).map(j => j.replace('-Jugend', '')).join('·');

      const skillTagsHtml = (ex.skills || [])
        .map(s => `<span class="ex-skill-tag">${s}</span>`).join('');

      const imgHtml = ex.grafik_url
        ? `<img class="ex-img" src="${ex.grafik_url}" alt="${ex.titel}" loading="lazy">` : '';

      const sections = [
        ex.aufbau        && { label: 'Aufbau',       text: ex.aufbau },
        ex.durchfuehrung && { label: 'Durchführung', text: ex.durchfuehrung },
      ].filter(Boolean);

      const sectionsHtml = `<div class="dr-sections-grid">${sections.map(s => `
        <div class="ex-section">
          <div class="ex-section-head">
            <span class="ex-section-dot"></span>
            <span class="ex-section-title">${s.label}</span>
          </div>
          <p class="ex-section-text">${s.text}</p>
        </div>`).join('')}</div>`;

      const detailLink = href
        ? `<a href="${href}" class="ex-detail-link">
             Übung im Detail
             <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
           </a>` : '';

      return `
        <div class="ex-card phase-${phaseKey}" data-phase="${phaseKey}" data-index="${index}" id="dr-ex-${ex.id}">
          <button class="ex-card-header" onclick="toggleItem(this)">
            <div class="ex-badges">
              <span class="ex-phase-badge" style="background:${phaseColor}">${phaseLabel.toUpperCase()}</span>
              ${jugendStr ? `<span class="ex-jugend-badge">${jugendStr}</span>` : ''}
            </div>
            <h3 class="ex-card-title">${ex.titel}</h3>
            ${ex.kurzbeschreibung ? `<p class="ex-card-desc">${ex.kurzbeschreibung}</p>` : ''}
            <svg class="ex-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          ${imgHtml}
          <div class="ex-card-body">
            ${skillTagsHtml ? `<div class="ex-skills">${skillTagsHtml}</div>` : ''}
            ${sectionsHtml}
            ${detailLink}
          </div>
        </div>`;
    }

    function toggleItem(btn) {
      btn.closest('.ex-card').classList.toggle('open');
    }

    function reroll() {
      const session = generateSession(allExercises, currentKey);
      if (session) {
        saveToHistory(session.exercises);
        sessionStorage.setItem(SESSION_KEY, JSON.stringify(session.exercises.map(e => e.id)));
      }
      renderSession(session);
    }

    // ── Init ──────────────────────────────────────────────────────
    const SESSION_KEY = `gen_${jugend}_${skill || ''}`;

    fetch('/exercises.json')
      .then(r => r.json())
      .then(data => {
        allExercises = data;

        // Kriterien-Bar mit Skills befüllen
        const validSkills = [...new Set(
          data.filter(e => e.status === 'veroeffentlicht' && (e.jugend || []).includes(jugend))
              .flatMap(e => e.skills || [])
        )].sort();
        buildCriteriaBar(validSkills);

        // Restore session on back-navigation
        const saved = sessionStorage.getItem(SESSION_KEY);
        if (saved) {
          try {
            const ids = JSON.parse(saved);
            const exercises = ids.map(id => data.find(e => e.id === id)).filter(Boolean);
            if (exercises.length > 0) {
              renderSession({ exercises, key: sessionKey(exercises), canReroll: true });
              return;
            }
          } catch(e) {}
        }

        const session = generateSession(data, null);
        if (session) {
          saveToHistory(session.exercises);
          sessionStorage.setItem(SESSION_KEY, JSON.stringify(session.exercises.map(e => e.id)));
        }
        renderSession(session);
      })
      .catch(() => {
        document.getElementById('session-list').innerHTML =
          '<div class="empty-state">Übungen konnten nicht geladen werden.</div>';
      });

    // ── Drawer ────────────────────────────────────────────────────
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
    }
  </script>
</body>
