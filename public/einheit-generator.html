<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einheit zusammenstellen – COACH UNITED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: 'Inter Tight', system-ui, sans-serif; background: #0E1430; min-height: 100dvh; }

    .container { width: 100%; min-height: 100dvh; background: #0E1430; display: flex; flex-direction: column; }

    /* ── Header ── */
    .header {
      background: #0E1430;
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky; top: 0; z-index: 20;
    }
    .logo-link { display: flex; align-items: center; text-decoration: none; }
    .logo-link img { width: 34px; height: 34px; object-fit: contain; }
    .burger-btn { background: none; border: none; cursor: pointer; padding: 6px; display: flex; flex-direction: column; gap: 5px; }
    .burger-btn span { display: block; width: 22px; height: 2px; background: #fff; border-radius: 2px; }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 20px 16px 100px; }

    /* ── Session Meta ── */
    .session-meta { margin-bottom: 20px; }

    .session-title {
      font-size: 20px; font-weight: 800; color: #fff;
      letter-spacing: -0.01em; margin-bottom: 10px;
    }

    .session-badges { display: flex; flex-wrap: wrap; gap: 6px; }

    .session-badge {
      padding: 4px 10px; border-radius: 8px;
      font-size: 12px; font-weight: 600;
    }
    .badge-jugend { background: rgba(30,107,255,0.2); color: #5b9bff; }
    .badge-skill  { background: rgba(14,106,69,0.3); color: #4dd69a; }

    /* ── Accordion ── */
    .accordion-list { display: flex; flex-direction: column; gap: 10px; }

    .accordion-item {
      border-radius: 14px; overflow: hidden;
      background: #fff;
      border-left: 4px solid #E6E8EF;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .phase-aufwaermen { border-left-color: #C2611F; }
    .phase-hauptteil  { border-left-color: #0E6A45; }
    .phase-spielformat{ border-left-color: #0F3FA8; }

    .accordion-header {
      width: 100%; padding: 14px 14px 14px 12px;
      background: #fff; border: none; cursor: pointer;
      display: flex; align-items: flex-start; gap: 10px;
      text-align: left; transition: background 0.15s;
    }
    .accordion-header:hover { background: #fafbfd; }

    .accordion-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: #f0f2f5; font-size: 11px; font-weight: 700;
      color: #7a8494; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }

    .accordion-header-main { flex: 1; min-width: 0; }

    .accordion-phase-label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 3px;
    }
    .phase-aufwaermen .accordion-phase-label { color: #C2611F; }
    .phase-hauptteil  .accordion-phase-label { color: #0E6A45; }
    .phase-spielformat .accordion-phase-label { color: #0F3FA8; }

    .accordion-title {
      font-size: 14px; font-weight: 800; color: #0E1430;
      letter-spacing: -0.005em; line-height: 1.2; margin-bottom: 6px;
    }

    .accordion-tags { display: flex; flex-wrap: wrap; gap: 4px; }

    .tag {
      padding: 2px 7px; border-radius: 6px;
      font-size: 11px; font-weight: 600;
    }
    .tag-jugend { background: rgba(30,107,255,0.12); color: #1E6BFF; }
    .tag-skill  { background: rgba(14,106,69,0.12); color: #0E6A45; }

    .accordion-chevron {
      flex-shrink: 0; margin-top: 4px; color: #b0b8c8;
      transition: transform 0.22s ease;
    }
    .accordion-item.open .accordion-chevron { transform: rotate(180deg); }

    /* ── Accordion Body ── */
    .accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.28s ease; }
    .accordion-item.open .accordion-body { max-height: 900px; }

    .accordion-body-inner {
      padding: 0 14px 16px 44px;
      border-top: 1px solid #f0f2f5;
    }

    .detail-desc {
      font-size: 13px; color: #555; line-height: 1.6;
      padding: 12px 0 14px; border-bottom: 1px solid #f4f5f7;
    }

    .detail-block { padding: 12px 0; border-bottom: 1px solid #f4f5f7; }
    .detail-block:last-of-type { border-bottom: none; }

    .detail-label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: #adb5c2; margin-bottom: 5px;
    }

    .detail-text {
      font-size: 13px; color: #444;
      line-height: 1.65; white-space: pre-line;
    }

    .accordion-img {
      width: 100%; max-height: 200px; object-fit: contain;
      border-radius: 10px; margin-top: 12px;
      background: #f7f9ff; display: block;
    }

    .detail-link {
      display: inline-flex; align-items: center; gap: 5px;
      color: #1E6BFF; font-size: 13px; font-weight: 600;
      text-decoration: none; margin-top: 14px;
      padding: 8px 14px; border: 1.5px solid rgba(30,107,255,0.25);
      border-radius: 10px; transition: background 0.15s;
    }
    .detail-link:hover { background: #f0f5ff; }

    /* ── Reroll ── */
    .reroll-wrap { margin-top: 16px; }

    .reroll-btn {
      width: 100%; padding: 16px;
      border: 1.5px solid rgba(30,107,255,0.4);
      border-radius: 14px; background: rgba(30,107,255,0.08);
      color: #5b9bff;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.18s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .reroll-btn:hover { background: rgba(30,107,255,0.15); transform: translateY(-1px); }
    .reroll-btn:disabled { border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.25); background: transparent; cursor: default; transform: none; }

    .no-variations {
      text-align: center; font-size: 12px;
      color: rgba(255,255,255,0.3); margin-top: 8px;
    }

    /* ── Empty / Error ── */
    .empty-state {
      text-align: center; padding: 48px 24px;
      color: rgba(255,255,255,0.35); font-size: 14px; line-height: 1.6;
    }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #0E1430; border-top: 1px solid rgba(255,255,255,0.1);
      display: flex; padding: 10px 0 24px; z-index: 20;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      border: none; background: none; cursor: pointer; padding: 4px; text-decoration: none;
      color: rgba(255,255,255,0.4); font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.01em; transition: color 0.15s;
    }
    .nav-item.active { color: #1E6BFF; }
    .nav-icon { width: 22px; height: 22px; }

    /* ── Drawer ── */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: -280px; width: 260px; height: 100vh;
      background: #131929; z-index: 50; padding: 32px 24px;
      transition: right 0.25s ease; box-shadow: -8px 0 32px rgba(0,0,0,0.4);
    }
    .drawer.open { right: 0; }
    .drawer-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: rgba(255,255,255,0.6); padding: 4px; }
    .drawer-logo { width: 36px; margin-bottom: 28px; }
    .drawer-link { display: block; padding: 12px 0; font-family: 'Inter Tight', system-ui, sans-serif; font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.85); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .drawer-link:last-child { border-bottom: none; }
    .drawer-link:hover { color: #1E6BFF; }
  </style>
  <link rel="stylesheet" href="/desktop.css">
  <script src="/desktop-nav.js" defer></script>
</head>
<body>
  <div class="container">

    <header class="header">
      <a href="/home" class="logo-link">
        <img src="/logo.png" alt="Coach United">
      </a>
      <button class="burger-btn" onclick="openDrawer()">
        <span></span><span></span><span></span>
      </button>
    </header>

    <div class="content">
      <div id="session-meta" class="session-meta"></div>
      <div id="session-list" class="accordion-list"></div>
      <div class="reroll-wrap">
        <button id="reroll-btn" class="reroll-btn" onclick="reroll()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
          Neu würfeln
        </button>
        <p id="no-variations" class="no-variations" style="display:none;">
          Keine weitere Variation verfügbar.
        </p>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="/uebungen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4 L6 17 L16 17 Z"/><line x1="7.5" y1="11" x2="14.5" y2="11"/><line x1="4.5" y1="17" x2="17.5" y2="17"/>
        </svg>
        <span>Übungen</span>
      </a>
      <a href="/einheiten" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="3" width="14" height="16" rx="2"/><line x1="7" y1="8" x2="15" y2="8"/><line x1="7" y1="12" x2="15" y2="12"/><line x1="7" y1="16" x2="12" y2="16"/>
        </svg>
        <span>Einheiten</span>
      </a>
      <a href="/wissen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h6a3 3 0 013 3v12a3 3 0 00-3-3H4z"/><path d="M18 4h-6a3 3 0 00-3 3v12a3 3 0 013-3h6z"/>
        </svg>
        <span>Wissen</span>
      </a>
      <a href="/whatsapp-info" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6a2 2 0 012-2h10a2 2 0 012 2v7a2 2 0 01-2 2H9l-4 3v-3H6a2 2 0 01-2-2z"/>
        </svg>
        <span>WhatsApp</span>
      </a>
    </nav>

    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
      <img src="/logo.png" alt="Coach United" class="drawer-logo">
      <a href="/ueber-uns" class="drawer-link">Über uns</a>
      <a href="/impressum" class="drawer-link">Impressum</a>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const jugend = params.get('jugend');
    const skill  = params.get('skill') || null;

    let allExercises = [];
    let currentKey   = null;

    if (!jugend) window.location.href = '/home';

    // ── Phasen-Konfiguration ──────────────────────────────────────
    const PHASES = [
      { key: 'aufwaermen',  label: 'Aufwärmen',   match: 'Aufwärmen',   slots: 2 },
      { key: 'hauptteil',   label: 'Hauptteil',   match: 'Hauptteil',   slots: 2 },
      { key: 'spielformat', label: 'Spielformat',  match: 'Spielformat', slots: 1 },
    ];

    // ── Algorithmus ───────────────────────────────────────────────
    function makeClusters(exercises) {
      const visited = new Set();
      const clusters = [];
      for (const ex of exercises) {
        if (visited.has(ex.id)) continue;
        visited.add(ex.id);
        const sisters = exercises.filter(o =>
          !visited.has(o.id) && (ex.schwester_ids || []).includes(o.id)
        );
        sisters.forEach(s => visited.add(s.id));
        clusters.push([ex, ...sisters]);
      }
      return clusters;
    }

    function clusterMatchesSkill(cluster, s) {
      if (!s) return true;
      return cluster.some(e => (e.skills || []).includes(s));
    }

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function sessionKey(exercises) {
      return exercises.map(e => e.id).join('-');
    }

    function generateSession(exercises, excludeKey) {
      const valid = exercises.filter(e =>
        e.status === 'veroeffentlicht' && (e.jugend || []).includes(jugend)
      );

      const byPhase = {};
      valid.forEach(e => {
        if (!byPhase[e.trainingsphase]) byPhase[e.trainingsphase] = [];
        byPhase[e.trainingsphase].push(e);
      });

      const clustersByPhase = PHASES.map(p => ({
        ...p,
        clusters: makeClusters(byPhase[p.match] || [])
          .filter(c => c.length === p.slots && clusterMatchesSkill(c, skill))
      }));

      if (clustersByPhase.some(p => !p.clusters.length)) return null;

      const totalCombinations = clustersByPhase.reduce((acc, p) => acc * p.clusters.length, 1);

      if (totalCombinations === 1) {
        const result = clustersByPhase.flatMap(p => p.clusters[0]);
        return { exercises: result, key: sessionKey(result), canReroll: false };
      }

      for (let i = 0; i < 30; i++) {
        const result = clustersByPhase.flatMap(p => pickRandom(p.clusters));
        const key = sessionKey(result);
        if (key !== excludeKey) return { exercises: result, key, canReroll: true };
      }

      return null;
    }

    // ── Render ────────────────────────────────────────────────────
    function renderSession(session) {
      if (!session) {
        document.getElementById('session-meta').innerHTML = '';
        document.getElementById('session-list').innerHTML =
          '<div class="empty-state">Für diese Kombination sind nicht genug Übungen vorhanden.</div>';
        document.getElementById('reroll-btn').disabled = true;
        return;
      }

      currentKey = session.key;
      document.getElementById('reroll-btn').disabled = !session.canReroll;
      document.getElementById('no-variations').style.display = session.canReroll ? 'none' : 'block';

      const skillBadge = skill
        ? `<span class="session-badge badge-skill">Fokus: ${skill}</span>` : '';
      document.getElementById('session-meta').innerHTML = `
        <h1 class="session-title">Einheit ${jugend}</h1>
        <div class="session-badges">
          <span class="session-badge badge-jugend">${jugend}</span>
          ${skillBadge}
        </div>`;

      document.getElementById('session-list').innerHTML =
        session.exercises.map((ex, i) => renderAccordionItem(ex, i)).join('');

      const first = document.querySelector('.accordion-item');
      if (first) first.classList.add('open');
    }

    function renderAccordionItem(ex, index) {
      const phaseKey = PHASES.find(p => p.match === ex.trainingsphase)?.key || 'hauptteil';
      const phaseLabel = PHASES.find(p => p.match === ex.trainingsphase)?.label || ex.trainingsphase;
      const backUrl = encodeURIComponent(window.location.href);
      const href = ex.url_slug ? `/uebung/${ex.url_slug}?back=${backUrl}` : null;

      const jugendTags = (ex.jugend || [])
        .map(j => `<span class="tag tag-jugend">${j.replace('-Jugend', '')}</span>`).join('');
      const skillTags = (ex.skills || []).slice(0, 2)
        .map(s => `<span class="tag tag-skill">${s}</span>`).join('');

      const detailLink = href
        ? `<a href="${href}" class="detail-link">
             Übung im Detail
             <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
           </a>` : '';

      const imgHtml = ex.grafik_url
        ? `<img class="accordion-img" src="${ex.grafik_url}" alt="${ex.titel}" loading="lazy">` : '';

      const blocks = [
        ex.kurzbeschreibung && { label: null,              text: ex.kurzbeschreibung, cls: 'detail-desc' },
        ex.aufbau           && { label: 'Aufbau',          text: ex.aufbau           },
        ex.durchfuehrung    && { label: 'Durchführung',    text: ex.durchfuehrung    },
        ex.coaching_fokus   && { label: 'Coaching-Fokus',  text: ex.coaching_fokus   },
        ex.varianten        && { label: 'Varianten',       text: ex.varianten        },
      ].filter(Boolean);

      const bodyContent = imgHtml + blocks.map(b =>
        b.cls
          ? `<p class="${b.cls}">${b.text}</p>`
          : `<div class="detail-block">
               <p class="detail-label">${b.label}</p>
               <p class="detail-text">${b.text}</p>
             </div>`
      ).join('') + detailLink;

      return `
        <div class="accordion-item phase-${phaseKey}" data-index="${index}">
          <button class="accordion-header" onclick="toggleItem(this)">
            <span class="accordion-num">${index + 1}</span>
            <div class="accordion-header-main">
              <p class="accordion-phase-label">${phaseLabel}</p>
              <h3 class="accordion-title">${ex.titel}</h3>
              <div class="accordion-tags">${jugendTags}${skillTags}</div>
            </div>
            <svg class="accordion-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div class="accordion-body">
            <div class="accordion-body-inner">${bodyContent}</div>
          </div>
        </div>`;
    }

    function toggleItem(btn) {
      btn.closest('.accordion-item').classList.toggle('open');
    }

    function reroll() {
      const session = generateSession(allExercises, currentKey);
      renderSession(session);
    }

    // ── Init ──────────────────────────────────────────────────────
    fetch('/exercises.json')
      .then(r => r.json())
      .then(data => {
        allExercises = data;
        renderSession(generateSession(data, null));
      })
      .catch(() => {
        document.getElementById('session-list').innerHTML =
          '<div class="empty-state">Übungen konnten nicht geladen werden.</div>';
      });

    // ── Drawer ────────────────────────────────────────────────────
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
    }
  </script>
</body>
</html>
