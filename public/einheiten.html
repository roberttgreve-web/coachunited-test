<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainingseinheiten – COACH UNITED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      width: 375px;
      min-height: 100vh;
      background: #ffffff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
    }

    .header {
      background: white;
      padding: 4px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #f0f2f5;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .logo-link { display: flex; align-items: center; text-decoration: none; }
    .logo-link img { width: 80px; height: 80px; object-fit: contain; }

    .burger-btn {
      background: none; border: none; cursor: pointer;
      padding: 4px; color: #333;
      display: flex; flex-direction: column; gap: 5px;
    }
    .burger-btn span { display: block; width: 22px; height: 2px; background: #333; border-radius: 2px; }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 80px;
    }

    .section-title {
      font-family: 'Barlow', 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #9aa3b0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .einheit-card {
      text-decoration: none;
      color: inherit;
      background: white;
      border-radius: 14px;
      border: 1px solid #edf0f5;
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: box-shadow 0.18s, transform 0.18s;
      display: flex;
      align-items: stretch;
    }
    .einheit-card:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.09);
      transform: translateY(-1px);
    }

    .card-body {
      flex: 1;
      padding: 14px;
      min-width: 0;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #0a1628;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 11px;
      color: #9aa3b0;
      line-height: 1.4;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-thumb {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
      object-fit: cover;
      align-self: center;
      margin: 8px 0 8px 10px;
      border-radius: 8px;
    }
    .card-thumb-placeholder {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
      background: #edf0f5;
      border-radius: 8px;
      margin: 8px 0 8px 10px;
    }

    .card-arrow {
      display: flex;
      align-items: center;
      padding-right: 14px;
      color: #c0c7d3;
    }
    .card-arrow svg { width: 16px; height: 16px; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 375px;
      background: white;
      border-top: 1px solid #f0f2f5;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 14px;
      z-index: 20;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      border: none; background: none; cursor: pointer;
      padding: 4px; text-decoration: none;
      color: #c0c7d3; transition: color 0.15s;
    }
    .nav-item.active { color: #1B6BF4; }
    .nav-icon { width: 22px; height: 22px; }
    .nav-label { font-size: 10px; font-weight: 500; }

    /* Drawer */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 40; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; top: 0; right: -280px; width: 260px; height: 100vh; background: white; z-index: 50; padding: 32px 24px; transition: right 0.25s ease; box-shadow: -8px 0 32px rgba(0,0,0,0.12); }
    .drawer.open { right: 0; }
    .drawer-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: #555; padding: 4px; }
    .drawer-logo { width: 48px; margin-bottom: 28px; }
    .drawer-link { display: block; padding: 12px 0; font-size: 15px; font-weight: 500; color: #1a1a2e; text-decoration: none; border-bottom: 1px solid #f0f2f5; }
    .drawer-link:last-child { border-bottom: none; }
    .drawer-link:hover { color: #1B6BF4; }
  </style>
</head>
<body>
  <div class="container">

    <header class="header">
      <a href="/home" class="logo-link">
        <img src="/logo.png" alt="Coach United">
      </a>
      <button class="burger-btn" onclick="openDrawer()">
        <span></span><span></span><span></span>
      </button>
    </header>

    <div class="content">
      <p class="section-title">Trainingseinheiten</p>
      <div id="einheiten-list">
        <div style="padding:40px 0; text-align:center; color:#9aa3b0; font-size:14px;">Einheiten werden geladen…</div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="/uebungen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
        </svg>
        <span class="nav-label">Übungen</span>
      </a>
      <a href="/einheiten" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
        <span class="nav-label">Einheiten</span>
      </a>
      <a href="/wissen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span class="nav-label">Wissen</span>
      </a>
      <a href="/whatsapp-info" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="nav-label">WhatsApp</span>
      </a>
    </nav>

    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
      <img src="/logo.png" alt="Coach United" class="drawer-logo">
      <a href="/ueber-uns" class="drawer-link">Über uns</a>
      <a href="/impressum" class="drawer-link">Impressum</a>
    </div>
  </div>

  <script>
    const JSON_URL = 'https://raw.githubusercontent.com/roberttgreve-web/coachunited-test/main/public/einheiten.json';

    fetch(JSON_URL)
      .then(r => r.json())
      .then(einheiten => {
        const list = document.getElementById('einheiten-list');
        if (!einheiten.length) {
          list.innerHTML = '<div style="padding:40px 0; text-align:center; color:#9aa3b0; font-size:14px;">Keine Einheiten vorhanden.</div>';
          return;
        }

        list.innerHTML = einheiten.map(e => {
          const subtitle = e.uebungen.map(u => u.titel).join(' · ');
          const thumb = e.foto_url
            ? `<img class="card-thumb" src="${e.foto_url}" alt="${e.titel}" loading="lazy">`
            : `<div class="card-thumb-placeholder"></div>`;

          return `
            <a href="/einheit/${e.url_slug}" class="einheit-card">
              ${thumb}
              <div class="card-body">
                <p class="card-title">${e.titel}</p>
                <p class="card-subtitle">${subtitle}</p>
              </div>
              <div class="card-arrow">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
              </div>
            </a>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('einheiten-list').innerHTML =
          '<div style="padding:40px 0; text-align:center; color:#9aa3b0; font-size:14px;">Einheiten konnten nicht geladen werden.</div>';
      });

    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
    }
  </script>
</body>
</html>
