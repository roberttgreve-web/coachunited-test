<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einheit erstellen – COACH UNITED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: 'Inter Tight', system-ui, sans-serif; background: #0E1430; min-height: 100dvh; }

    .container { width: 100%; min-height: 100dvh; background: #0E1430; display: flex; flex-direction: column; }

    /* ── Header ── */
    .header {
      background: #0E1430;
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky; top: 0; z-index: 20;
    }
    .logo-link { display: flex; align-items: center; text-decoration: none; }
    .logo-link img { width: 34px; height: 34px; object-fit: contain; }
    .burger-btn { background: none; border: none; cursor: pointer; padding: 6px; display: flex; flex-direction: column; gap: 5px; }
    .burger-btn span { display: block; width: 22px; height: 2px; background: #fff; border-radius: 2px; }

    /* ── Content ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 28px 22px 100px;
      overflow-y: auto;
    }

    .page-title {
      font-size: 22px; font-weight: 800; color: #fff;
      letter-spacing: -0.02em; margin-bottom: 6px;
    }
    .page-subtitle {
      font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 28px; line-height: 1.5;
    }

    .selects { display: flex; flex-direction: column; gap: 18px; }

    .field { display: flex; flex-direction: column; gap: 8px; }

    .field-label { font-size: 14px; font-weight: 600; color: #fff; letter-spacing: -0.005em; }
    .field-label-row { display: flex; align-items: baseline; justify-content: space-between; }
    .field-optional {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.4);
      letter-spacing: 0.12em; text-transform: uppercase;
    }

    .sel-btn {
      width: 100%; display: flex; align-items: center; padding: 16px;
      background: #fff; border: 1.5px solid transparent; border-radius: 12px;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 16px; font-weight: 700; color: #6B7390;
      cursor: pointer; text-align: left;
    }
    .sel-btn.has-value { color: #0E1430; }
    .sel-btn > span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sel-arrow { flex-shrink: 0; transition: transform 0.16s ease; }
    .sel-btn.open .sel-arrow { transform: rotate(180deg); }

    .dropdown {
      display: none; border-radius: 10px; background: #fff;
      overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .dropdown.open { display: block; }

    .drop-option {
      width: 100%; display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; background: transparent;
      border: none; border-top: 1px solid #E6E8EF;
      cursor: pointer; text-align: left;
      font-family: 'Inter Tight', system-ui, sans-serif; transition: background 0.12s;
    }
    .drop-option:first-child { border-top: none; }
    .drop-option.active { background: #F5F7FB; }
    .drop-option:hover:not(.active) { background: #fafbfd; }
    .drop-label { font-size: 15px; font-weight: 600; color: #0E1430; flex: 1; }
    .drop-age { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; font-weight: 600; color: #6B7390; letter-spacing: 0.04em; }

    .skill-picker {
      display: none; border-radius: 10px; background: #fff;
      padding: 14px 14px 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      flex-direction: column; gap: 10px;
    }
    .skill-picker.open { display: flex; }

    .surprise-btn {
      display: flex; align-items: center; gap: 9px; padding: 11px 12px;
      background: #F5F7FB; color: #0E1430; border: none; border-radius: 8px;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer; text-align: left;
      transition: background 0.15s, color 0.15s;
    }
    .surprise-btn.active { background: #1E6BFF; color: #fff; }

    .skill-section-label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 9px; font-weight: 600; color: #6B7390;
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .skill-section-label em { font-style: normal; text-transform: none; letter-spacing: -0.005em; }

    .skill-pills { display: flex; flex-wrap: wrap; gap: 6px; }

    .skill-pill {
      padding: 7px 12px; background: #fff; color: #0E1430;
      border: 1.5px solid #E6E8EF; border-radius: 999px;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.12s;
    }
    .skill-pill.active { background: #1E6BFF; color: #fff; border-color: #1E6BFF; }
    .skill-pill:disabled { opacity: 0.4; cursor: not-allowed; }

    .skill-done-row {
      display: flex; align-items: center; gap: 10px;
      padding-top: 10px; border-top: 1px solid #E6E8EF;
    }
    .skill-done-status { flex: 1; font-size: 12px; font-weight: 600; color: #6B7390; }
    .skill-done-btn {
      padding: 9px 18px; background: #0E1430; color: #fff;
      border: none; border-radius: 8px;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }

    .cta-btn {
      width: 100%; padding: 16px 18px;
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4);
      border: none; border-radius: 10px;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 16px; font-weight: 700; cursor: not-allowed;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.16s, color 0.16s;
    }
    .cta-btn.active { background: #1E6BFF; color: #fff; cursor: pointer; }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #0E1430; border-top: 1px solid rgba(255,255,255,0.1);
      display: flex; padding: 10px 0 24px; z-index: 20;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      border: none; background: none; cursor: pointer; padding: 4px; text-decoration: none;
      color: rgba(255,255,255,0.4); font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.01em; transition: color 0.15s;
    }
    .nav-item.active { color: #1E6BFF; }
    .nav-icon { width: 22px; height: 22px; }

    /* ── Drawer ── */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: -280px; width: 260px; height: 100vh;
      background: #131929; z-index: 50; padding: 32px 24px;
      transition: right 0.25s ease; box-shadow: -8px 0 32px rgba(0,0,0,0.4);
    }
    .drawer.open { right: 0; }
    .drawer-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: rgba(255,255,255,0.6); padding: 4px; }
    .drawer-logo { width: 36px; margin-bottom: 28px; }
    .drawer-link { display: block; padding: 12px 0; font-family: 'Inter Tight', system-ui, sans-serif; font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.85); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .drawer-link:last-child { border-bottom: none; }
    .drawer-link:hover { color: #1E6BFF; }
  </style>
  <link rel="stylesheet" href="/desktop.css">
  <script src="/desktop-nav.js" defer></script>
  <script src="/feedback-widget.js" defer></script>
</head>
<body>
  <div class="container">

    <header class="header">
      <a href="/home" class="logo-link">
        <img src="/logo.png" alt="Coach United">
      </a>
      <button class="burger-btn" onclick="openDrawer()">
        <span></span><span></span><span></span>
      </button>
    </header>

    <div class="content">
      <h1 class="page-title">Einheit erstellen</h1>
      <p class="page-subtitle">Wähle deine Jugend und einen optionalen Schwerpunkt – wir stellen eine passende Einheit zusammen.</p>

      <div class="selects">

        <!-- Jugend -->
        <div class="field" id="field-jugend">
          <label class="field-label">Welche Jugend trainierst du?</label>
          <button class="sel-btn" id="jugend-btn" onclick="toggleJugend(event)">
            <span id="jugend-label">Auswählen…</span>
            <svg class="sel-arrow" width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M5 7L9 11L13 7" stroke="#0E1430" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="dropdown" id="jugend-dropdown">
            <button class="drop-option" onclick="selectJugend(event,'G-Jugend','Bambini (G-Jugend)','U7')">
              <span class="drop-label">Bambini (G-Jugend)</span><span class="drop-age">U7</span>
            </button>
            <button class="drop-option" onclick="selectJugend(event,'F-Jugend','F-Jugend','U8 / U9')">
              <span class="drop-label">F-Jugend</span><span class="drop-age">U8 / U9</span>
            </button>
            <button class="drop-option" onclick="selectJugend(event,'E-Jugend','E-Jugend','U10 / U11')">
              <span class="drop-label">E-Jugend</span><span class="drop-age">U10 / U11</span>
            </button>
            <button class="drop-option" onclick="selectJugend(event,'D-Jugend','D-Jugend','U12 / U13')">
              <span class="drop-label">D-Jugend</span><span class="drop-age">U12 / U13</span>
            </button>
          </div>
        </div>

        <!-- Skills -->
        <div class="field" id="field-skills" style="display:none;">
          <div class="field-label-row">
            <label class="field-label">Was willst du trainieren?</label>
            <span class="field-optional">Optional</span>
          </div>
          <button class="sel-btn has-value" id="skill-btn" onclick="toggleSkills(event)">
            <span id="skill-label">Überrasch mich</span>
            <svg class="sel-arrow" width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M5 7L9 11L13 7" stroke="#0E1430" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="skill-picker" id="skill-picker">
            <button class="surprise-btn active" id="surprise-btn" onclick="pickSurprise()">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <path d="M8 2l1.7 3.5 3.8.6-2.8 2.7.7 3.8L8 10.8l-3.4 1.8.7-3.8L2.5 6.1l3.8-.6L8 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              </svg>
              Überrasch mich
            </button>
            <div class="skill-section-label">Oder gezielt wählen <em>(max. 2)</em></div>
            <div class="skill-pills" id="skill-pills"></div>
            <div class="skill-done-row">
              <span class="skill-done-status" id="skill-status">Überrasch mich</span>
              <button class="skill-done-btn" onclick="closeSkills()">Fertig</button>
            </div>
          </div>
        </div>

        <!-- CTA -->
        <button class="cta-btn" id="cta-btn" onclick="goToGenerator()">
          Einheit zusammenstellen
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

      </div>
    </div>

    <nav class="bottom-nav">
      <a href="/uebungen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4 L6 17 L16 17 Z"/><line x1="7.5" y1="11" x2="14.5" y2="11"/><line x1="4.5" y1="17" x2="17.5" y2="17"/>
        </svg>
        <span>Alle Übungen</span>
      </a>
      <a href="/einheiten" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="3" width="14" height="16" rx="2"/><line x1="7" y1="8" x2="15" y2="8"/><line x1="7" y1="12" x2="15" y2="12"/><line x1="7" y1="16" x2="12" y2="16"/>
        </svg>
        <span>Einheit erstellen</span>
      </a>
      <a href="/wissen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h6a3 3 0 013 3v12a3 3 0 00-3-3H4z"/><path d="M18 4h-6a3 3 0 00-3 3v12a3 3 0 013-3h6z"/>
        </svg>
        <span>Wissen</span>
      </a>
      <a href="/whatsapp-info" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6a2 2 0 012-2h10a2 2 0 012 2v7a2 2 0 01-2 2H9l-4 3v-3H6a2 2 0 01-2-2z"/>
        </svg>
        <span>WhatsApp</span>
      </a>
    </nav>

    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
      <img src="/logo.png" alt="Coach United" class="drawer-logo">
      <a href="https://coachunited.de/trainingseinheiten/" target="_blank" class="drawer-link">Einheiten-Katalog</a>
      <a href="/ueber-uns" class="drawer-link">Über uns</a>
      <a href="/impressum" class="drawer-link">Impressum</a>
    </div>

  </div>

  <script>
    let allExercises = [];
    let selectedJugend = '';
    let selectedSkills = new Set();
    let isSurprise = true;

    fetch('/exercises.json')
      .then(r => r.json())
      .then(data => { allExercises = data; });

    function makeClusters(exercises) {
      const visited = new Set();
      const clusters = [];
      for (const ex of exercises) {
        if (visited.has(ex.id)) continue;
        visited.add(ex.id);
        const sisters = exercises.filter(o =>
          !visited.has(o.id) && (ex.schwester_ids || []).includes(o.id)
        );
        sisters.forEach(s => visited.add(s.id));
        clusters.push([ex, ...sisters]);
      }
      return clusters;
    }

    function buildSkillPills(jugend) {
      const valid = allExercises.filter(e =>
        e.status === 'veroeffentlicht' && (e.jugend || []).includes(jugend)
      );
      const byPhase = {};
      valid.forEach(e => {
        if (!byPhase[e.trainingsphase]) byPhase[e.trainingsphase] = [];
        byPhase[e.trainingsphase].push(e);
      });
      const aufClusters = makeClusters(byPhase['Aufwärmen'] || []).filter(c => c.length === 2);
      const hptClusters = makeClusters(byPhase['Hauptteil'] || []).filter(c => c.length === 2);
      const spfClusters = makeClusters(byPhase['Spielformat'] || []).filter(c => c.length === 1);
      const allSkills = [...new Set(valid.flatMap(e => e.skills || []))].sort();
      const validSkills = allSkills.filter(s =>
        aufClusters.some(c => c.some(e => (e.skills || []).includes(s))) &&
        hptClusters.some(c => c.some(e => (e.skills || []).includes(s))) &&
        spfClusters.some(c => c.some(e => (e.skills || []).includes(s)))
      );
      const container = document.getElementById('skill-pills');
      container.innerHTML = validSkills.map(s =>
        `<button class="skill-pill" onclick="toggleSkill('${s.replace(/'/g,"\\'")}',this)" data-skill="${s}">${s}</button>`
      ).join('');
    }

    function toggleJugend(e) {
      e.stopPropagation();
      const btn = document.getElementById('jugend-btn');
      const drop = document.getElementById('jugend-dropdown');
      const isOpen = btn.classList.contains('open');
      closeAll();
      if (!isOpen) { btn.classList.add('open'); drop.classList.add('open'); }
    }

    function selectJugend(e, value, label) {
      e.stopPropagation();
      selectedJugend = value;
      selectedSkills.clear();
      isSurprise = true;
      document.getElementById('jugend-label').textContent = label;
      const btn = document.getElementById('jugend-btn');
      btn.classList.add('has-value');
      btn.classList.remove('open');
      document.getElementById('jugend-dropdown').classList.remove('open');
      document.querySelectorAll('#jugend-dropdown .drop-option').forEach(o => o.classList.remove('active'));
      e.currentTarget.classList.add('active');
      document.getElementById('field-skills').style.display = 'flex';
      document.getElementById('cta-btn').classList.add('active');
      document.getElementById('skill-label').textContent = 'Überrasch mich';
      document.getElementById('skill-btn').classList.add('has-value');
      document.getElementById('surprise-btn').classList.add('active');
      document.getElementById('skill-status').textContent = 'Überrasch mich';
      if (allExercises.length) buildSkillPills(value);
      else fetch('/exercises.json').then(r=>r.json()).then(data=>{allExercises=data;buildSkillPills(value);});
    }

    function toggleSkills(e) {
      e.stopPropagation();
      const btn = document.getElementById('skill-btn');
      const picker = document.getElementById('skill-picker');
      const isOpen = btn.classList.contains('open');
      closeAll();
      if (!isOpen) { btn.classList.add('open'); picker.classList.add('open'); }
    }

    function pickSurprise() {
      isSurprise = true;
      selectedSkills.clear();
      document.getElementById('surprise-btn').classList.add('active');
      document.querySelectorAll('.skill-pill').forEach(p => { p.classList.remove('active'); p.disabled = false; });
      document.getElementById('skill-label').textContent = 'Überrasch mich';
      document.getElementById('skill-btn').classList.add('has-value');
      document.getElementById('skill-status').textContent = 'Überrasch mich';
      closeSkills();
    }

    function toggleSkill(skill) {
      isSurprise = false;
      document.getElementById('surprise-btn').classList.remove('active');
      if (selectedSkills.has(skill)) {
        selectedSkills.delete(skill);
      } else {
        if (selectedSkills.size >= 2) return;
        selectedSkills.add(skill);
        if (selectedSkills.size === 2) setTimeout(closeSkills, 220);
      }
      document.querySelectorAll('.skill-pill').forEach(p => {
        const s = p.dataset.skill;
        const on = selectedSkills.has(s);
        const capped = !on && selectedSkills.size >= 2;
        p.classList.toggle('active', on);
        p.disabled = capped;
      });
      const label = selectedSkills.size === 0 ? 'Auswählen…' : Array.from(selectedSkills).join(' · ');
      document.getElementById('skill-label').textContent = label;
      document.getElementById('skill-btn').classList.toggle('has-value', selectedSkills.size > 0);
      const status = selectedSkills.size === 0
        ? 'Keine Auswahl'
        : `${selectedSkills.size} ${selectedSkills.size === 1 ? 'Skill' : 'Skills'} ausgewählt`;
      document.getElementById('skill-status').textContent = status;
    }

    function closeSkills() {
      document.getElementById('skill-btn').classList.remove('open');
      document.getElementById('skill-picker').classList.remove('open');
    }

    function closeAll() {
      document.getElementById('jugend-btn').classList.remove('open');
      document.getElementById('jugend-dropdown').classList.remove('open');
      closeSkills();
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('#field-jugend') && !e.target.closest('#field-skills')) closeAll();
    });

    function goToGenerator() {
      if (!selectedJugend) return;
      let url = '/einheit-generator?jugend=' + encodeURIComponent(selectedJugend);
      if (!isSurprise && selectedSkills.size > 0) {
        url += '&skill=' + encodeURIComponent(Array.from(selectedSkills)[0]);
      }
      window.location.href = url;
    }

    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
    }
  </script>
</body>
</html>
