<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artikel – COACH UNITED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      width: 375px;
      min-height: 100vh;
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
    }

    .header {
      background: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #f0f2f5;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .back-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; cursor: pointer;
      text-decoration: none; color: #1B6BF4;
      font-size: 14px; font-weight: 500; padding: 4px 0;
    }
    .back-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .burger-btn {
      background: none; border: none; cursor: pointer;
      padding: 4px; display: flex; flex-direction: column; gap: 5px;
    }
    .burger-btn span { display: block; width: 22px; height: 2px; background: #333; border-radius: 2px; }

    /* Hero image */
    .hero-img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      display: block;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 100px;
    }

    h1 {
      font-family: 'Barlow', 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #0a1628;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    /* Rich text content */
    .article-body { font-size: 15px; line-height: 1.8; color: #4a5568; }
    .article-body h2 {
      font-family: 'Barlow', 'Inter', sans-serif;
      font-size: 19px; font-weight: 800;
      color: #0a1628; margin: 28px 0 10px;
      padding-left: 12px;
      border-left: 3px solid #1B6BF4;
    }
    .article-body h3 {
      font-size: 16px; font-weight: 700;
      color: #1a2a40; margin: 20px 0 8px;
    }
    .article-body p { margin-bottom: 14px; }
    .article-body ul, .article-body ol {
      padding-left: 20px; margin-bottom: 14px;
    }
    .article-body li { margin-bottom: 6px; }
    .article-body strong { font-weight: 700; color: #0a1628; }
    .article-body em { font-style: italic; }

    #loading { padding: 60px 24px; text-align: center; color: #9aa3b0; font-size: 15px; }
    #not-found { padding: 60px 24px; text-align: center; color: #9aa3b0; font-size: 15px; }
    #not-found a { color: #1B6BF4; text-decoration: none; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 375px; background: white;
      border-top: 1px solid #f0f2f5;
      display: flex; justify-content: space-around;
      padding: 10px 0 14px; z-index: 20;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      border: none; background: none; cursor: pointer;
      padding: 4px; text-decoration: none;
      color: #c0c7d3; transition: color 0.15s;
    }
    .nav-item.active { color: #1B6BF4; }
    .nav-icon { width: 22px; height: 22px; }
    .nav-label { font-size: 10px; font-weight: 500; }

    /* Drawer */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 40; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; top: 0; right: -280px; width: 260px; height: 100vh; background: white; z-index: 50; padding: 32px 24px; transition: right 0.25s ease; box-shadow: -8px 0 32px rgba(0,0,0,0.12); }
    .drawer.open { right: 0; }
    .drawer-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: #555; padding: 4px; }
    .drawer-logo { width: 48px; margin-bottom: 28px; }
    .drawer-link { display: block; padding: 12px 0; font-size: 15px; font-weight: 500; color: #1a1a2e; text-decoration: none; border-bottom: 1px solid #f0f2f5; }
    .drawer-link:last-child { border-bottom: none; }
    .drawer-link:hover { color: #1B6BF4; }
  </style>
  <link rel="stylesheet" href="/desktop.css">
  <script src="/desktop-nav.js" defer></script>
</head>
<body>
  <div class="container">

    <header class="header">
      <a href="/wissen" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Wissen
      </a>
      <button class="burger-btn" onclick="openDrawer()">
        <span></span><span></span><span></span>
      </button>
    </header>

    <div id="loading">Artikel wird geladen…</div>
    <div id="not-found" style="display:none;">
      <p>Artikel nicht gefunden.</p><br>
      <a href="/wissen">← Zurück zur Übersicht</a>
    </div>

    <div id="article-content" style="display:none; flex:1; flex-direction:column;">
      <img id="hero-img" class="hero-img" src="" alt="" style="display:none;">
      <div class="content">
        <h1 id="titel"></h1>
        <div id="article-body" class="article-body"></div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="/uebungen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
        </svg>
        <span class="nav-label">Übungen</span>
      </a>
      <a href="/einheiten" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
        <span class="nav-label">Einheiten</span>
      </a>
      <a href="/wissen" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span class="nav-label">Wissen</span>
      </a>
      <a href="/whatsapp-info" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="nav-label">WhatsApp</span>
      </a>
    </nav>

    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
      <img src="/logo.png" alt="Coach United" class="drawer-logo">
      <a href="/ueber-uns" class="drawer-link">Über uns</a>
      <a href="/impressum" class="drawer-link">Impressum</a>
    </div>
  </div>

  <script>
    const slug = window.location.pathname.replace(/^\/artikel\//, '').replace(/\/$/, '');

    fetch('https://raw.githubusercontent.com/roberttgreve-web/coachunited-test/main/public/articles.json')
      .then(r => r.json())
      .then(articles => {
        const article = articles.find(a => a.url_slug === slug);
        if (!article) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('not-found').style.display = 'block';
          return;
        }

        document.title = article.titel + ' – COACH UNITED';
        document.getElementById('titel').textContent = article.titel;
        document.getElementById('article-body').innerHTML = article.inhalt || '';

        if (article.foto_url) {
          const img = document.getElementById('hero-img');
          img.src = article.foto_url;
          img.alt = article.foto_alt || article.titel;
          img.style.display = 'block';
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('article-content').style.display = 'flex';
      })
      .catch(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('not-found').style.display = 'block';
      });

    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
    }
  </script>
</body>
</html>
