<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Übung – COACH UNITED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter Tight', system-ui, sans-serif;
      background: #f0eee9;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      width: 375px;
      min-height: 100vh;
      background: #fff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.14);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #E6E8EF;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .logo-link { display: flex; align-items: center; text-decoration: none; }
    .logo-link img { width: 34px; height: 34px; object-fit: contain; }

    .burger-btn {
      background: none; border: none; cursor: pointer;
      padding: 4px; display: flex; flex-direction: column; gap: 4.5px;
    }
    .burger-btn span {
      display: block; width: 22px; height: 2px;
      background: #0E1430; border-radius: 2px;
    }

    /* ── Dark Back Bar ── */
    .back-bar {
      background: #0E1430;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.85);
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      text-decoration: none;
    }
    .share-btn {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      padding: 0;
    }

    /* ── Grafik ── */
    .grafik-panel {
      background: #F4F6FA;
      padding: 24px 18px;
      border-bottom: 1px solid #E6E8EF;
      display: none;
    }
    .grafik-panel img {
      width: 100%;
      display: block;
      max-height: 240px;
      object-fit: contain;
    }

    /* ── Scrollable Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 90px;
    }

    /* ── Title Block ── */
    .title-block {
      padding: 22px 18px 18px;
    }
    .phase-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .phase-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      color: #fff;
      border-radius: 4px;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .jahrgang-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      background: #EEF1F6;
      color: #0E1430;
      border-radius: 4px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .ex-title {
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #0E1430;
      line-height: 1.07;
      letter-spacing: -0.025em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .ex-desc {
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #3B4565;
      margin-bottom: 16px;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .skill-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      background: #FF4D1F;
      color: #fff;
      border-radius: 4px;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 600;
    }

    /* ── Accordions ── */
    .accordion-group { padding: 0 18px; }

    .accordion {
      border-top: 1px solid #E6E8EF;
    }
    .accordion:last-child { border-bottom: 1px solid #E6E8EF; }

    .accordion-btn {
      width: 100%;
      padding: 16px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      font-family: 'Inter Tight', system-ui, sans-serif;
    }
    .acc-dot {
      width: 8px; height: 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .acc-title {
      flex: 1;
      font-size: 16px;
      font-weight: 700;
      color: #0E1430;
      letter-spacing: -0.01em;
    }
    .acc-icon {
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .accordion.open .acc-icon { transform: rotate(45deg); }

    .accordion-body {
      display: none;
      padding-bottom: 18px;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 15.5px;
      line-height: 1.6;
      color: #3B4565;
    }
    .accordion.open .accordion-body { display: block; }
    .accordion-body ul { padding-left: 18px; }
    .accordion-body li { margin-bottom: 6px; }

    /* ── Sektion-Kacheln (Coaching, Leichter, Schwieriger, FAQ) ── */
    .tiles-section { padding: 18px 18px 0; }
    .tiles-label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #6B7390;
      margin-bottom: 10px;
    }
    .tiles-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .tile-btn {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      padding: 14px 14px 13px;
      background: #fff;
      border: 1px solid #E6E8EF;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      font-family: 'Inter Tight', system-ui, sans-serif;
      transition: box-shadow 0.15s;
    }
    .tile-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .tile-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tile-name {
      font-size: 13px;
      font-weight: 700;
      color: #0E1430;
      letter-spacing: -0.01em;
    }
    .tile-hint {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6B7390;
      margin-top: -2px;
    }

    /* ── Bottom Sheet ── */
    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(14,20,48,0.45);
      z-index: 50;
    }
    .sheet-overlay.open { display: block; }
    .sheet {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      background: #fff;
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      padding: 12px 18px 28px;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.18);
    }
    .sheet-handle {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: #D8D5CD;
      margin: 0 auto 14px;
    }
    .sheet-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .sheet-dot { width: 8px; height: 8px; border-radius: 50%; }
    .sheet-title {
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #0E1430;
    }
    .sheet-body {
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 15.5px;
      line-height: 1.6;
      color: #3B4565;
    }
    .sheet-body ul { padding-left: 18px; }
    .sheet-body li { margin-bottom: 6px; }

    /* ── Sisters & Related ── */
    .section-block { padding: 24px 18px 0; }
    .section-label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #6B7390;
      margin-bottom: 10px;
    }
    .sister-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px;
      border: 1px solid #E6E8EF;
      border-radius: 12px;
      text-decoration: none;
      margin-bottom: 8px;
    }
    .sister-link:last-child { margin-bottom: 0; }
    .sister-link:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .sister-accent {
      width: 3px; height: 28px;
      background: #1E6BFF;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .sister-name {
      flex: 1;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #0E1430;
      letter-spacing: -0.01em;
    }
    .sister-chevron { color: #6B7390; }

    .related-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px;
      border: 1px solid #E6E8EF;
      border-radius: 12px;
      text-decoration: none;
    }
    .related-link:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .related-name {
      flex: 1;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #0E1430;
    }

    /* ── Feedback ── */
    .feedback-block { padding: 24px 18px 0; }
    .feedback-card {
      background: #0E1430;
      color: #fff;
      border-radius: 14px;
      padding: 18px 16px;
    }
    .feedback-title {
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }
    .feedback-card textarea {
      width: 100%;
      min-height: 70px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 8px;
      color: #fff;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      outline: none;
    }
    .feedback-card textarea::placeholder { color: rgba(255,255,255,0.45); }
    .feedback-card textarea:focus { border-color: rgba(255,255,255,0.45); }
    .feedback-submit {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: #1E6BFF;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 375px;
      background: #fff;
      border-top: 1px solid #E6E8EF;
      display: flex;
      padding: 10px 0 24px;
      z-index: 20;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.05);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      border: none;
      background: none;
      cursor: pointer;
      padding: 4px;
      text-decoration: none;
      color: #6B7390;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .nav-item.active { color: #1E6BFF; }
    .nav-icon { width: 22px; height: 22px; }

    /* ── Drawer ── */
    .drawer-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.3); z-index: 40;
    }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: -280px;
      width: 260px; height: 100vh;
      background: #fff; z-index: 50;
      padding: 32px 24px;
      transition: right 0.25s ease;
      box-shadow: -8px 0 32px rgba(0,0,0,0.12);
    }
    .drawer.open { right: 0; }
    .drawer-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none;
      font-size: 22px; cursor: pointer; color: #555;
    }
    .drawer-logo { width: 48px; margin-bottom: 28px; }
    .drawer-link {
      display: block; padding: 12px 0;
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 15px; font-weight: 500;
      color: #0E1430; text-decoration: none;
      border-bottom: 1px solid #E6E8EF;
    }
    .drawer-link:last-child { border-bottom: none; }
    .drawer-link:hover { color: #1E6BFF; }

    #loading { padding: 60px 24px; text-align: center; color: #6B7390; font-size: 15px; }
    #not-found { display: none; padding: 60px 24px; text-align: center; color: #6B7390; font-size: 15px; }
    #not-found a { color: #1E6BFF; text-decoration: none; }
  </style>
  <link rel="stylesheet" href="/desktop.css">
  <script src="/desktop-nav.js" defer></script>
  <script src="/feedback-widget.js" defer></script>
</head>
<body>
  <div class="container">

    <header class="header">
      <a href="/home" class="logo-link">
        <img src="/logo.png" alt="Coach United">
      </a>
      <button class="burger-btn" onclick="openDrawer()">
        <span></span><span></span><span></span>
      </button>
    </header>

    <!-- Zurück-Bar -->
    <div class="back-bar">
      <a id="back-btn" href="/uebungen" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="back-label">Übersicht</span>
      </a>
      <button class="share-btn" onclick="shareExercise()" aria-label="Übung weiterempfehlen">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v8M5 5l3-3 3 3M3 10v3a1 1 0 001 1h8a1 1 0 001-1v-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div id="loading">Übung wird geladen…</div>
    <div id="not-found">
      <p>Übung nicht gefunden.</p><br>
      <a href="/uebungen">← Zurück zur Übersicht</a>
    </div>

    <div id="exercise-content" style="display:none; flex:1; flex-direction:column;">

      <!-- Grafik -->
      <div class="grafik-panel" id="grafik-panel">
        <img id="grafik-img" src="" alt="">
      </div>

      <div class="content">

        <!-- Title Block -->
        <div class="title-block">
          <div class="phase-row" id="phase-row"></div>
          <h1 class="ex-title" id="titel"></h1>
          <p class="ex-desc" id="beschreibung"></p>
          <div class="skill-tags" id="skill-tags"></div>
        </div>

        <!-- Aufbau + Durchführung — immer offen -->
        <div class="accordion-group">
          <div class="accordion open" id="acc-aufbau">
            <button class="accordion-btn" onclick="toggleAcc('aufbau')">
              <span class="acc-dot" style="background:#1E6BFF;"></span>
              <span class="acc-title">Aufbau</span>
              <svg class="acc-icon" width="14" height="14" viewBox="0 0 14 14">
                <line x1="7" y1="2" x2="7" y2="12" stroke="#3B4565" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="2" y1="7" x2="12" y2="7" stroke="#3B4565" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="accordion-body"><p id="aufbau"></p></div>
          </div>

          <div class="accordion open" id="acc-durchfuehrung">
            <button class="accordion-btn" onclick="toggleAcc('durchfuehrung')">
              <span class="acc-dot" style="background:#1E6BFF;"></span>
              <span class="acc-title">Durchführung</span>
              <svg class="acc-icon" width="14" height="14" viewBox="0 0 14 14">
                <line x1="7" y1="2" x2="7" y2="12" stroke="#3B4565" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="2" y1="7" x2="12" y2="7" stroke="#3B4565" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="accordion-body"><p id="durchfuehrung"></p></div>
          </div>
        </div>

        <!-- Sekundär-Kacheln -->
        <div class="tiles-section" id="tiles-section">
          <p class="tiles-label">Mehr zur Übung</p>
          <div class="tiles-grid" id="tiles-grid"></div>
        </div>

        <!-- Bottom Sheet -->
        <div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()">
          <div class="sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-title-row">
              <span class="sheet-dot" id="sheet-dot"></span>
              <span class="sheet-title" id="sheet-title"></span>
            </div>
            <div class="sheet-body" id="sheet-body"></div>
          </div>
        </div>

        <!-- Sisters -->
        <div class="section-block" id="sisters-block" style="display:none;">
          <p class="section-label">Andere Übungen mit gleichem Aufbau</p>
          <div id="sisters-list"></div>
        </div>

        <!-- Feedback -->
        <div class="feedback-block">
          <div class="feedback-card">
            <p class="feedback-title">Hilf uns, die Übung besser zu machen.</p>
            <textarea id="feedbackText" placeholder="Dein Feedback an uns"></textarea>
            <button class="feedback-submit" onclick="submitFeedback()">Feedback absenden</button>
          </div>
        </div>
        <div style="height:24px;"></div>

      </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="/uebungen" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4 L6 17 L16 17 Z"/><line x1="7.5" y1="11" x2="14.5" y2="11"/><line x1="4.5" y1="17" x2="17.5" y2="17"/>
        </svg>
        <span>Alle Übungen</span>
      </a>
      <a href="/einheiten" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="3" width="14" height="16" rx="2"/><line x1="7" y1="8" x2="15" y2="8"/><line x1="7" y1="12" x2="15" y2="12"/><line x1="7" y1="16" x2="12" y2="16"/>
        </svg>
        <span>Einheit erstellen</span>
      </a>
      <a href="/wissen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h6a3 3 0 013 3v12a3 3 0 00-3-3H4z"/><path d="M18 4h-6a3 3 0 00-3 3v12a3 3 0 013-3h6z"/>
        </svg>
        <span>Wissen</span>
      </a>
      <a href="/whatsapp-info" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6a2 2 0 012-2h10a2 2 0 012 2v7a2 2 0 01-2 2H9l-4 3v-3H6a2 2 0 01-2-2z"/>
          <circle cx="8" cy="9.5" r="0.6" fill="currentColor" stroke="none"/>
          <circle cx="11" cy="9.5" r="0.6" fill="currentColor" stroke="none"/>
          <circle cx="14" cy="9.5" r="0.6" fill="currentColor" stroke="none"/>
        </svg>
        <span>WhatsApp</span>
      </a>
    </nav>

    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
      <img src="/logo.png" alt="Coach United" class="drawer-logo">
      <a href="https://coachunited.de/trainingseinheiten/" target="_blank" class="drawer-link">Einheiten-Katalog</a>
      <a href="/ueber-uns" class="drawer-link">Über uns</a>
      <a href="/impressum" class="drawer-link">Impressum</a>
    </div>
  </div>

  <script>
    const PHASE_COLORS = {
      'Aufwärmen': '#C2611F',
      'Hauptteil': '#0E6A45',
      'Spielformat': '#0F3FA8',
    };

    const TILE_CONFIG = [
      { key: 'coaching_fokus',  label: 'Coaching-Fokus',        short: 'Coaching',    color: '#E89844' },
      { key: 'leichter_machen', label: 'Übung leichter machen', short: 'Leichter',    color: '#16A571' },
      { key: 'schwerer_machen', label: 'Übung schwieriger machen', short: 'Schwieriger', color: '#F23D3D' },
      { key: 'faq',             label: 'FAQ – Häufige Fragen',   short: 'FAQ',         color: '#7B61FF' },
    ];

    function toBulletList(text) {
      if (!text) return '';
      const items = text.split(/[;•]/).map(s => s.trim()).filter(Boolean);
      return items.length ? '<ul>' + items.map(i => `<li>${i}</li>`).join('') + '</ul>' : '';
    }

    function faqToHtml(faqArr) {
      if (!faqArr || !faqArr.length) return '';
      const items = faqArr.filter(f => f.frage && f.frage.trim());
      return items.length
        ? '<ul>' + items.map(f => `<li><strong>${f.frage}</strong><br>${f.antwort}</li>`).join('') + '</ul>'
        : '';
    }

    function toggleAcc(id) {
      document.getElementById('acc-' + id).classList.toggle('open');
    }

    // Bottom Sheet
    let sheetData = {};
    function openSheet(key) {
      const cfg = TILE_CONFIG.find(t => t.key === key);
      if (!cfg || !sheetData[key]) return;
      document.getElementById('sheet-dot').style.background = cfg.color;
      document.getElementById('sheet-title').textContent = cfg.label;
      document.getElementById('sheet-body').innerHTML = sheetData[key];
      document.getElementById('sheet-overlay').classList.add('open');
    }
    function closeSheet() {
      document.getElementById('sheet-overlay').classList.remove('open');
    }

    // Slug + back button
    const slug = window.location.pathname.replace(/^\/uebung\//, '').replace(/\/$/, '');
    const urlParams = new URLSearchParams(window.location.search);
    const backUrl = urlParams.get('back');
    const fromEinheit = urlParams.get('from');
    if (backUrl) {
      document.getElementById('back-btn').href = backUrl;
      document.getElementById('back-label').textContent = 'Zur Einheit';
    } else if (fromEinheit) {
      document.getElementById('back-btn').href = '/einheit/' + fromEinheit;
      document.getElementById('back-label').textContent = 'Zur Einheit';
    }

    fetch('https://raw.githubusercontent.com/roberttgreve-web/coachunited-test/main/public/exercises.json')
      .then(r => r.json())
      .then(exercises => {
        const ex = exercises.find(e => e.url_slug === slug);
        if (!ex) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('not-found').style.display = 'block';
          return;
        }

        document.title = ex.titel + ' – COACH UNITED';

        // Grafik
        if (ex.grafik_url) {
          document.getElementById('grafik-img').src = ex.grafik_url;
          document.getElementById('grafik-img').alt = ex.grafik_alt_text || ex.titel;
          document.getElementById('grafik-panel').style.display = 'block';
        }

        // Phase + Jahrgang
        const phaseRow = document.getElementById('phase-row');
        if (ex.trainingsphase) {
          const phaseColor = PHASE_COLORS[ex.trainingsphase] || '#0E1430';
          const pb = document.createElement('span');
          pb.className = 'phase-badge';
          pb.style.background = phaseColor;
          pb.textContent = ex.trainingsphase;
          phaseRow.appendChild(pb);
        }
        const jahrgangStr = (ex.jugend || []).map(j => j.replace('-Jugend','')).join('·');
        if (jahrgangStr) {
          const jb = document.createElement('span');
          jb.className = 'jahrgang-badge';
          jb.textContent = jahrgangStr;
          phaseRow.appendChild(jb);
        }

        // Titel + Beschreibung
        document.getElementById('titel').textContent = ex.titel;
        document.getElementById('beschreibung').textContent = ex.kurzbeschreibung || '';

        // Skill-Tags
        const skillContainer = document.getElementById('skill-tags');
        (ex.skills || []).forEach(s => {
          const span = document.createElement('span');
          span.className = 'skill-tag';
          span.textContent = s;
          skillContainer.appendChild(span);
        });

        // Akkordeons
        document.getElementById('aufbau').textContent = ex.aufbau || '';
        document.getElementById('durchfuehrung').textContent = ex.durchfuehrung || '';

        // Sekundär-Kacheln
        const hasCoaching = !!ex.coaching_fokus;
        const hasLeichter = !!ex.leichter_machen;
        const hasSchwerer = !!ex.schwerer_machen;
        const hasFaq = ex.faq && ex.faq.some(f => f.frage && f.frage.trim());

        sheetData['coaching_fokus'] = toBulletList(ex.coaching_fokus);
        sheetData['leichter_machen'] = toBulletList(ex.leichter_machen);
        sheetData['schwerer_machen'] = toBulletList(ex.schwerer_machen);
        sheetData['faq'] = faqToHtml(ex.faq);

        const tiles = TILE_CONFIG.filter(t =>
          t.key === 'faq' ? hasFaq
          : t.key === 'coaching_fokus' ? hasCoaching
          : t.key === 'leichter_machen' ? hasLeichter
          : t.key === 'schwerer_machen' ? hasSchwerer
          : false
        );

        if (tiles.length) {
          document.getElementById('tiles-grid').innerHTML = tiles.map(t => `
            <button class="tile-btn" onclick="openSheet('${t.key}')">
              <span class="tile-icon" style="background:${t.color}1A;">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <circle cx="10" cy="10" r="6" stroke="${t.color}" stroke-width="1.6"/>
                  <circle cx="10" cy="10" r="2.5" stroke="${t.color}" stroke-width="1.6"/>
                </svg>
              </span>
              <span class="tile-name">${t.short}</span>
              <span class="tile-hint">Antippen →</span>
            </button>`).join('');
        } else {
          document.getElementById('tiles-section').style.display = 'none';
        }

        // Sisters
        const sisterIds = ex.schwester_ids && ex.schwester_ids.length ? ex.schwester_ids
          : (ex.schwester_id ? [ex.schwester_id] : []);
        if (sisterIds.length) {
          const sisters = exercises.filter(e => sisterIds.includes(e.id) && e.url_slug);
          if (sisters.length) {
            document.getElementById('sisters-list').innerHTML = sisters.map(s => `
              <a href="/uebung/${s.url_slug}" class="sister-link">
                <span class="sister-accent"></span>
                <span class="sister-name">${s.titel}</span>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" class="sister-chevron">
                  <path d="M5 2L10 7L5 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </a>`).join('');
            document.getElementById('sisters-block').style.display = 'block';
          }
        }


        document.getElementById('loading').style.display = 'none';
        document.getElementById('exercise-content').style.display = 'flex';
      })
      .catch(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('not-found').style.display = 'block';
      });

    async function submitFeedback() {
      const text = document.getElementById('feedbackText').value.trim();
      if (!text) return;
      const btn = document.querySelector('.feedback-submit');
      const exTitle = document.getElementById('titel')?.textContent || window.location.pathname;
      btn.disabled = true;
      btn.textContent = 'Wird gesendet…';
      try {
        const res = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            access_key: '178bfb57-6bf5-45c0-9788-064568110b35',
            subject: `Übungs-Feedback: ${exTitle}`,
            from_name: 'Coach United Übungsdetail',
            message: text,
            uebung: exTitle,
            seite: window.location.pathname,
          }),
        });
        if (res.ok) {
          btn.textContent = 'Danke für dein Feedback!';
          btn.style.background = '#0E6A45';
          document.getElementById('feedbackText').value = '';
          setTimeout(() => {
            btn.disabled = false;
            btn.textContent = 'Feedback absenden';
            btn.style.background = '';
          }, 3000);
        } else throw new Error();
      } catch {
        btn.disabled = false;
        btn.textContent = 'Erneut versuchen';
      }
    }

    function shareExercise() {
      const url = window.location.href;
      const title = document.getElementById('titel').textContent;
      if (navigator.share) {
        navigator.share({ title, url }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url).then(() => alert('Link wurde kopiert!'));
      }
    }

    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
    }
  </script>
</body>
</html>
