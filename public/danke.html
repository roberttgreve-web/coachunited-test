<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta property="og:image" content="https://test.coachunited.de/og-image.png">
  <title>Danke – COACH UNITED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter Tight', system-ui, sans-serif; background: #f0eee9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
    .container { width: 375px; min-height: 100vh; background: #fff; border-radius: 28px; overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,0.14); display: flex; flex-direction: column; }
    .header { background: #fff; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #E6E8EF; }
    .logo-link { display: flex; align-items: center; text-decoration: none; }
    .logo-link img { width: 56px; height: 56px; object-fit: contain; }
    .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 28px; text-align: center; }
    .check-circle {
      width: 72px; height: 72px; border-radius: 50%;
      background: #0E6A45; display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
    }
    .check-circle svg { color: #fff; }
    h1 { font-size: 26px; font-weight: 800; color: #0E1430; letter-spacing: -0.02em; margin-bottom: 12px; }
    p { font-size: 15px; color: #6B7390; line-height: 1.6; margin-bottom: 32px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 24px; background: #0E1430; color: #fff;
      border-radius: 10px; text-decoration: none;
      font-size: 15px; font-weight: 700; transition: background 0.15s;
    }
    .back-btn:hover { background: #1a2347; }
    .bottom-nav {
      position: sticky; bottom: 0;
      background: #fff; border-top: 1px solid #E6E8EF;
      display: flex; padding: 10px 0 24px; z-index: 20;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.05);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      border: none; background: none; cursor: pointer; padding: 4px; text-decoration: none;
      color: #6B7390; font-family: 'Inter Tight', system-ui, sans-serif;
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.01em; transition: color 0.15s;
    }
    .nav-item.active { color: #1E6BFF; }
    .nav-icon { width: 22px; height: 22px; }
  </style>
  <link rel="stylesheet" href="/desktop.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="/home" class="logo-link">
        <img src="/logo.png" alt="Coach United">
      </a>
    </header>

    <div class="content">
      <div class="check-circle">
        <svg width="36" height="36" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
      <h1>Danke!</h1>
      <p>Dein Vorschlag wurde abgesendet und wird von uns bearbeitet.</p>
      <a href="/uebung-einreichen" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H3M3 12l7-7M3 12l7 7"/>
        </svg>
        Weitere Übung einreichen
      </a>
    </div>

    <nav class="bottom-nav">
      <a href="/uebungen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4 L6 17 L16 17 Z"/><line x1="7.5" y1="11" x2="14.5" y2="11"/><line x1="4.5" y1="17" x2="17.5" y2="17"/>
        </svg>
        <span>Alle Übungen</span>
      </a>
      <a href="/einheiten" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="3" width="14" height="16" rx="2"/><line x1="7" y1="8" x2="15" y2="8"/><line x1="7" y1="12" x2="15" y2="12"/><line x1="7" y1="16" x2="12" y2="16"/>
        </svg>
        <span>Einheit erhalten</span>
      </a>
      <a href="/whatsapp-info" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6a2 2 0 012-2h10a2 2 0 012 2v7a2 2 0 01-2 2H9l-4 3v-3H6a2 2 0 01-2-2z"/>
        </svg>
        <span>WhatsApp-Kanal</span>
      </a>
      <a href="/uebung-einreichen" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15.5 2.5a2.121 2.121 0 013 3L7 17l-4 1 1-4 10.5-10.5z"/>
        </svg>
        <span>Einreichen</span>
      </a>
    </nav>
  </div>
</body>
</html>
