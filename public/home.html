<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COACH UNITED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 375px;
      height: 667px;
      background: #ffffff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.12);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Main content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 28px 20px;
      overflow: hidden;
    }

    /* Logo */
    .logo {
      width: 220px;
      height: 220px;
      object-fit: contain;
      margin-bottom: 24px;
    }

    /* Headline */
    .headline {
      font-family: 'Barlow', 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #333333;
      text-align: center;
      line-height: 1.25;
      margin-bottom: 40px;
    }

    /* Jugend Dropdown */
    .jugend-select-wrapper {
      width: 100%;
      position: relative;
      margin-bottom: 16px;
    }

    .jugend-select {
      width: 100%;
      padding: 18px 48px 18px 20px;
      border: 1.5px solid #e4e8ef;
      border-radius: 14px;
      background: white;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: #9aa3b0;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.18s;
      outline: none;
    }

    .jugend-select:focus,
    .jugend-select.has-value {
      border-color: #003D82;
      color: #0a1628;
    }

    .select-arrow {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #003D82;
    }

    /* CTA Button */
    .cta-button {
      width: 100%;
      padding: 17px;
      background: #1B6BF4;
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.18s ease;
      opacity: 0.4;
      pointer-events: none;
    }

    .cta-button.active {
      opacity: 1;
      pointer-events: all;
    }

    .cta-button.active:hover {
      background: #1458d4;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(27, 107, 244, 0.35);
    }

    /* Bottom Navigation */
    .bottom-nav {
      background: white;
      border-top: 1px solid #f0f2f5;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 14px;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      border: none;
      background: none;
      cursor: pointer;
      padding: 6px;
      text-decoration: none;
      color: #c0c7d3;
      transition: color 0.15s;
    }

    .nav-item.active { color: #003D82; }

    .nav-icon {
      width: 22px;
      height: 22px;
    }

    .nav-label {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }
  </style>
  <link rel="stylesheet" href="/desktop.css">
  <script src="/desktop-nav.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="content">

      <img src="/logo.png" alt="Coach United Logo" class="logo">

      <h1 class="headline">Trainingsübungen<br>für den Kinderfußball</h1>

      <div class="jugend-select-wrapper">
        <select class="jugend-select" id="jugend" onchange="onJugendChange(this)">
          <option value="" disabled selected>Welche Jugend trainierst du?</option>
          <option value="G-Jugend">G-Jugend (U6 – U7)</option>
          <option value="F-Jugend">F-Jugend (U8 – U9)</option>
          <option value="E-Jugend">E-Jugend (U10 – U11)</option>
          <option value="D-Jugend">D-Jugend (U12 – U13)</option>
        </select>
        <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>

      <button class="cta-button" id="cta" onclick="goToExercises()">Los geht's</button>

    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <a href="/uebungen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
        </svg>
        <span class="nav-label">Übungen</span>
      </a>
      <a href="/einheiten" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
        <span class="nav-label">Einheiten</span>
      </a>
      <a href="/wissen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span class="nav-label">Wissen</span>
      </a>
      <a href="/whatsapp-info" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="nav-label">WhatsApp</span>
      </a>
    </div>
  </div>

  <script>
    function onJugendChange(select) {
      select.classList.add('has-value');
      document.getElementById('cta').classList.add('active');
    }

    function goToExercises() {
      const jugend = document.getElementById('jugend').value;
      if (!jugend) return;
      window.location.href = '/uebungen?jugend=' + encodeURIComponent(jugend);
    }
  </script>
</body>
</html>
