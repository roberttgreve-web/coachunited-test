<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COACH UNITED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 375px;
      height: 667px;
      background: #ffffff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.12);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Main content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 32px 24px;
      overflow: hidden;
    }

    /* Logo */
    .logo {
      width: 130px;
      height: 130px;
      object-fit: contain;
      margin-bottom: 20px;
    }

    /* Subtitle */
    .subtitle {
      font-size: 14px;
      font-weight: 400;
      color: #5a6476;
      margin-bottom: 28px;
      text-align: center;
      line-height: 1.5;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: #003D82;
      opacity: 0.25;
      margin-bottom: 36px;
    }

    /* Selection label */
    .selection-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #003D82;
      opacity: 0.6;
      margin-bottom: 16px;
      align-self: flex-start;
    }

    /* Jugend pills */
    .jugend-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: 100%;
      margin-bottom: 32px;
    }

    .jugend-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 8px;
      border: 1.5px solid #e4e8ef;
      border-radius: 14px;
      background: white;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .jugend-pill:hover {
      border-color: #003D82;
      background: #f5f8ff;
    }

    .jugend-pill.selected {
      border-color: #003D82;
      background: #003D82;
    }

    .pill-letter {
      font-size: 18px;
      font-weight: 700;
      color: #003D82;
      line-height: 1;
      margin-bottom: 4px;
      transition: color 0.18s ease;
    }

    .jugend-pill.selected .pill-letter {
      color: white;
    }

    .pill-age {
      font-size: 9px;
      font-weight: 400;
      color: #9aa3b0;
      transition: color 0.18s ease;
    }

    .jugend-pill.selected .pill-age {
      color: rgba(255,255,255,0.7);
    }

    /* CTA Button */
    .cta-button {
      width: 100%;
      padding: 17px;
      background: #003D82;
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.18s ease;
      opacity: 0.4;
      pointer-events: none;
    }

    .cta-button.active {
      opacity: 1;
      pointer-events: all;
    }

    .cta-button.active:hover {
      background: #002d63;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 61, 130, 0.28);
    }

    /* Bottom Navigation */
    .bottom-nav {
      background: white;
      border-top: 1px solid #f0f2f5;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 14px;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      border: none;
      background: none;
      cursor: pointer;
      padding: 6px;
      text-decoration: none;
      color: #c0c7d3;
      transition: color 0.15s;
    }

    .nav-item.active { color: #003D82; }

    .nav-icon {
      width: 22px;
      height: 22px;
    }

    .nav-label {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">

      <img src="/logo.png" alt="Coach United Logo" class="logo">

      <p class="subtitle">Trainingsübungen für den Kinderfußball</p>

      <div class="divider"></div>

      <p class="selection-label">Welche Jugend trainierst du?</p>

      <div class="jugend-grid">
        <button class="jugend-pill" data-value="G-Jugend" onclick="selectJugend(this)">
          <span class="pill-letter">G</span>
          <span class="pill-age">U6–U7</span>
        </button>
        <button class="jugend-pill" data-value="F-Jugend" onclick="selectJugend(this)">
          <span class="pill-letter">F</span>
          <span class="pill-age">U8–U9</span>
        </button>
        <button class="jugend-pill" data-value="E-Jugend" onclick="selectJugend(this)">
          <span class="pill-letter">E</span>
          <span class="pill-age">U10–U11</span>
        </button>
        <button class="jugend-pill" data-value="D-Jugend" onclick="selectJugend(this)">
          <span class="pill-letter">D</span>
          <span class="pill-age">U12–U13</span>
        </button>
      </div>

      <button class="cta-button" id="cta" onclick="goToExercises()">Los geht's</button>

    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <a href="/home" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span class="nav-label">Home</span>
      </a>
      <a href="/uebungen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v8M8 12h8"/>
        </svg>
        <span class="nav-label">Übungen</span>
      </a>
      <a href="/wissen" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span class="nav-label">Wissen</span>
      </a>
      <a href="https://www.whatsapp.com/channel/0029VbAqTP68kyyEFg3oyX2t" target="_blank" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="nav-label">WhatsApp</span>
      </a>
    </div>
  </div>

  <script>
    let selected = null;

    function selectJugend(btn) {
      document.querySelectorAll('.jugend-pill').forEach(p => p.classList.remove('selected'));
      btn.classList.add('selected');
      selected = btn.dataset.value;
      document.getElementById('cta').classList.add('active');
    }

    function goToExercises() {
      if (!selected) return;
      window.location.href = '/uebungen';
    }
  </script>
</body>
</html>
